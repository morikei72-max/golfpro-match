<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach — スケジュールカレンダー</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#1D9E75;--gd:#085041;--gl:#E1F5EE;
  --accent:#5dd4a8;--gold:#BA7517;--red:#E24B4A;
  --border:#e0ece6;--text:#1a2e24;--muted:#6b8a78;
  --kyoto:#1D9E75;--kyoto-bg:#E1F5EE;
  --fushimi:#1976D2;--fushimi-bg:#E3F2FD;
  --round-bg:#FFFBEB;--round-border:#F59E0B;
}
html,body{min-height:100%;background:#f0f7f4;font-family:'Noto Sans JP',sans-serif;color:var(--text);}
.hdr{background:var(--gd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.hdr-logo{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:900;color:#fff;}
.hdr-logo span{color:var(--accent);}
.hdr-back{font-size:13px;color:#fff;font-weight:700;cursor:pointer;padding:7px 16px;border:1.5px solid rgba(255,255,255,0.4);border-radius:20px;text-decoration:none;background:rgba(255,255,255,0.1);}
.view-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);}
.view-tab{flex:1;padding:13px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;}
.view-tab.active{color:var(--g);border-bottom-color:var(--g);}
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 14px;background:#fff;border-bottom:1px solid var(--border);font-size:11px;}
.leg{display:flex;align-items:center;gap:4px;color:var(--muted);}
.leg-dot{width:11px;height:11px;border-radius:3px;}
.content{padding:10px 0 80px;}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;}
.week-nav-btn{background:var(--gl);border:none;border-radius:8px;padding:6px 16px;font-size:15px;cursor:pointer;color:var(--gd);font-weight:700;}
.week-label{font-size:13px;font-weight:700;color:var(--gd);}
.week-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.week-table{width:100%;min-width:520px;border-collapse:collapse;font-size:11px;}
.week-table th{background:#f0f7f4;padding:6px 3px;text-align:center;font-weight:700;font-size:11px;border:1px solid var(--border);color:var(--gd);}
.week-table th.time-th{width:38px;min-width:38px;}
.week-table th.today-th{background:var(--gl);color:var(--g);}
.week-table td{border:1px solid var(--border);padding:1px;vertical-align:top;min-height:36px;height:36px;position:relative;}
.week-table td.time-td{background:#f8fbf9;text-align:center;font-size:10px;color:var(--muted);vertical-align:middle;font-weight:600;width:38px;}
.week-table td.day-td{cursor:pointer;transition:background .15s;}
.week-table td.day-td:hover{background:#f0faf5;}
.week-table td.today-td{background:#fffef0;}
.week-table td.round-td{background:var(--round-bg);}
.slot{border-radius:4px;padding:2px 4px;font-size:10px;font-weight:700;margin:1px;position:relative;line-height:1.3;display:block;}
.slot.kyoto{background:var(--kyoto-bg);color:var(--kyoto);border-left:3px solid var(--kyoto);}
.slot.fushimi{background:var(--fushimi-bg);color:var(--fushimi);border-left:3px solid var(--fushimi);}
.slot.booked{outline:2px solid var(--red);}
.booked-stamp{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;line-height:1;}
.round-card{border-radius:10px;border:2px solid var(--round-border);background:var(--round-bg);margin:2px;padding:4px 6px;position:relative;}
.round-card.booked{border-color:var(--red);}
.round-hdr{font-size:10px;font-weight:700;color:#92400E;}
.round-stamp{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.month-wrap{padding:8px 14px 0;}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.month-nav-btn{background:var(--gl);border:none;border-radius:8px;padding:6px 16px;font-size:15px;cursor:pointer;color:var(--gd);font-weight:700;}
.month-label{font-size:14px;font-weight:700;color:var(--gd);}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.month-day-hdr{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:5px 0;}
.month-cell{min-height:56px;background:#fff;border-radius:8px;border:1px solid var(--border);padding:4px;cursor:pointer;transition:all .2s;position:relative;}
.month-cell:hover{border-color:var(--g);background:#f0faf5;}
.month-cell.today{border-color:var(--g);border-width:2px;}
.month-cell.other-month{background:#f8f8f8;opacity:.5;cursor:default;}
.month-date{font-size:11px;font-weight:700;margin-bottom:2px;}
.month-cell.today .month-date{color:var(--g);}
.month-dots{display:flex;gap:2px;flex-wrap:wrap;}
.month-dot{width:7px;height:7px;border-radius:50%;}
.month-hint{font-size:10px;color:var(--muted);text-align:center;margin-top:8px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;color:var(--gd);margin-bottom:3px;}
.modal-date{font-size:12px;color:var(--muted);margin-bottom:14px;}
.exist-item{background:#f8fbf9;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.exist-type{font-size:12px;font-weight:700;color:var(--gd);}
.exist-detail{font-size:11px;color:var(--muted);}
.btn-del{padding:7px 14px;background:#fff0f0;color:var(--red);border:1px solid var(--red);border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit;}
.sec-title{font-size:12px;font-weight:700;color:var(--text);margin:12px 0 6px;}
.store-chips{display:flex;gap:8px;flex-wrap:wrap;}
.store-chip{padding:8px 16px;border-radius:20px;border:2px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted);}
.store-chip.sel-kyoto{background:var(--kyoto-bg);border-color:var(--kyoto);color:var(--kyoto);}
.store-chip.sel-fushimi{background:var(--fushimi-bg);border-color:var(--fushimi);color:var(--fushimi);}
.store-chip.sel-both{background:#fff0f9;border-color:#c026d3;color:#c026d3;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.toggle-lbl{font-size:13px;font-weight:700;}
.toggle{position:relative;width:46px;height:25px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-sl{position:absolute;inset:0;background:#ccc;border-radius:25px;cursor:pointer;transition:.3s;}
.toggle-sl:before{content:'';position:absolute;width:19px;height:19px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-sl{background:var(--g);}
.toggle input:checked+.toggle-sl:before{transform:translateX(21px);}
.hour-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.hour-chip{padding:9px 4px;border-radius:8px;border:1px solid var(--border);font-size:11px;text-align:center;cursor:pointer;transition:all .2s;}
.hour-chip.sel{background:var(--gl);border-color:var(--g);color:var(--g);font-weight:700;}
.hour-chip.confirmed{background:#ffebee;border-color:var(--red);color:var(--red);cursor:not-allowed;font-size:10px;}
.time-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.time-sel{flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;outline:none;background:#fff;}
.btn-save{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;}
.btn-close{width:100%;padding:12px;background:#f0f0f0;color:var(--muted);border:none;border-radius:12px;font-family:inherit;font-size:13px;cursor:pointer;margin-top:8px;}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--gd);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;}
.bottom-back{width:100%;padding:12px;background:#f0f7f4;color:var(--gd);border:1.5px solid var(--g);border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">My<span>Coach</span></div>
  <a class="hdr-back" href="coach.html">← コーチ画面</a>
</div>
<div class="view-tabs">
  <div class="view-tab active" id="tab-week" onclick="switchView('week')">週ビュー</div>
  <div class="view-tab" id="tab-month" onclick="switchView('month')">月ビュー</div>
</div>
<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--kyoto)"></div>京都・インドア</div>
  <div class="leg"><div class="leg-dot" style="background:var(--fushimi)"></div>伏見・インドア</div>
  <div class="leg"><div class="leg-dot" style="background:var(--round-border)"></div>ラウンド</div>
  <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>予約済み</div>
</div>
<div class="content">
  <div id="view-week">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="moveWeek(-1)">‹ 前</button>
      <div class="week-label" id="week-label"></div>
      <button class="week-nav-btn" onclick="moveWeek(1)">次 ›</button>
    </div>
    <div class="week-wrap">
      <table class="week-table" id="week-table"></table>
    </div>
  </div>
  <div id="view-month" style="display:none">
    <div class="month-wrap">
      <div class="month-nav">
        <button class="month-nav-btn" onclick="moveMonth(-1)">‹</button>
        <div class="month-label" id="month-label"></div>
        <button class="month-nav-btn" onclick="moveMonth(1)">›</button>
      </div>
      <div class="month-grid" id="month-hdr"></div>
      <div class="month-grid" id="month-grid" style="margin-top:3px;"></div>
      <div class="month-hint">日付をタップ → 週ビューへ移動</div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">スケジュール設定</div>
    <div class="modal-date" id="modal-date"></div>
    <div id="exist-wrap"></div>
    <div class="sec-title">① 店舗を選択</div>
    <div class="store-chips">
      <div class="store-chip" id="chip-kyoto" onclick="pickStore('kyoto')">京都店</div>
      <div class="store-chip" id="chip-fushimi" onclick="pickStore('fushimi')">伏見店</div>
      <div class="store-chip" id="chip-both" onclick="pickStore('both')">両店舗</div>
    </div>
    <div class="toggle-row" style="margin-top:12px;">
      <div class="toggle-lbl">🏌 インドアレッスン</div>
      <label class="toggle"><input type="checkbox" id="tog-indoor" onchange="onToggle('indoor',this.checked)"><span class="toggle-sl"></span></label>
    </div>
    <div id="sec-indoor" style="display:none">
      <p style="font-size:11px;color:var(--muted);margin-top:4px;">店舗選択→時間をタップ（複数可）</p>
      <div class="hour-grid" id="hour-grid"></div>
    </div>
    <div class="toggle-row">
      <div class="toggle-lbl">⛳ ラウンド</div>
      <label class="toggle"><input type="checkbox" id="tog-round" onchange="onToggle('round',this.checked)"><span class="toggle-sl"></span></label>
    </div>
    <div id="sec-round" style="display:none">
      <div class="time-row">
        <span style="font-size:12px;font-weight:700;">開始</span>
        <select class="time-sel" id="round-start"></select>
        <span style="font-size:12px;font-weight:700;">終了</span>
        <select class="time-sel" id="round-end"></select>
      </div>
    </div>
    <button class="btn-save" onclick="saveSlot()">✅ 保存する</button>
    <button class="btn-close" onclick="closeModal()">閉じる</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="bottom-bar">
  <button class="bottom-back" onclick="location.href='coach.html'">← コーチ画面に戻る</button>
</div>
<script>
const SUPABASE_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}});
const BASE='https://soft-speculoos-5ef188.netlify.app/';
let coachId=null,weekOffset=0,currentMonth=new Date(),allSlots=[],modalDate=null,selStore=null,selHours=[];
(async()=>{
  const urlStore=new URLSearchParams(location.search).get('store');
  if(urlStore)localStorage.setItem('gc_store',urlStore);
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.replace(BASE+'index.html');return;}
  coachId=session.user.id;
  buildRoundOpts();
  await loadSlots();
  buildWeek();
})();
async function loadSlots(){
  try{const {data}=await sb.from('schedules').select('*').eq('coach_id',coachId);allSlots=data||[];}catch(e){allSlots=[];}
}
function switchView(v){
  document.getElementById('view-week').style.display=v==='week'?'block':'none';
  document.getElementById('view-month').style.display=v==='month'?'block':'none';
  document.getElementById('tab-week').classList.toggle('active',v==='week');
  document.getElementById('tab-month').classList.toggle('active',v==='month');
  if(v==='month')buildMonth();
}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getDate(s){return s.date||s.slot_date||'';}
function getStore(s){return s.store_key||s.store_id||'kyoto';}
function getHour(s){return parseInt(s.start_time||s.slot_hour||0);}
function buildWeek(){
  const today=new Date();
  const mon=new Date(today);mon.setDate(today.getDate()-today.getDay()+1+weekOffset*7);
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d);}
  const days=['月','火','水','木','金','土','日'];
  document.getElementById('week-label').textContent=
    (dates[0].getMonth()+1)+'/'+dates[0].getDate()+'〜'+(dates[6].getMonth()+1)+'/'+dates[6].getDate();
  const table=document.getElementById('week-table');table.innerHTML='';
  let thead='<thead><tr><th class="time-th">時間</th>';
  dates.forEach((d,i)=>{
    const isToday=d.toDateString()===today.toDateString();
    thead+=`<th class="${isToday?'today-th':''}">${days[i]}<br><b>${d.getMonth()+1}/${d.getDate()}</b></th>`;
  });
  thead+='</tr></thead>';
  table.innerHTML=thead;
  const tbody=document.createElement('tbody');
  for(let h=8;h<=22;h++){
    const tr=document.createElement('tr');
    const timeTd=document.createElement('td');timeTd.className='time-td';timeTd.textContent=h+':00';tr.appendChild(timeTd);
    dates.forEach(d=>{
      const td=document.createElement('td');
      const dateStr=fmtDate(d);
      if(d.toDateString()===today.toDateString())td.classList.add('today-td');
      const daySlots=allSlots.filter(s=>getDate(s)===dateStr);
      const rounds=daySlots.filter(s=>s.lesson_type==='round');
      const indoors=daySlots.filter(s=>s.lesson_type==='indoor'&&getHour(s)===h);
      rounds.forEach(r=>{
        const rFrom=parseInt(r.block_from||8),rTo=parseInt(r.block_to||17);
        if(rFrom===h){
          td.classList.add('round-td');
          const card=document.createElement('div');
          card.className='round-card'+(r.status==='booked'?' booked':'');
          const sk=getStore(r);
          const sl=sk==='both'?'両店':sk==='kyoto'?'京都':'伏見';
          card.innerHTML=`<div class="round-hdr">⛳ ${sl} ${rFrom}〜${rTo}時</div>`;
          if(r.status==='booked'){const st=document.createElement('div');st.className='round-stamp';st.textContent='確';card.appendChild(st);}
          td.appendChild(card);
        } else if(rFrom<h&&h<rTo){td.classList.add('round-td');}
      });
      indoors.forEach(s=>{
        const sk=getStore(s);
        const stores2=sk==='both'?['kyoto','fushimi']:[sk];
        stores2.forEach(k=>{
          const slot=document.createElement('div');
          slot.className='slot '+k+(s.status==='booked'?' booked':'');
          slot.textContent=k==='kyoto'?'京都':'伏見';
          if(s.status==='booked'){const st=document.createElement('div');st.className='booked-stamp';st.textContent='確';slot.appendChild(st);}
          td.appendChild(slot);
        });
      });
      td.classList.add('day-td');
      td.onclick=()=>openModal(dateStr,h);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}
function moveWeek(dir){weekOffset+=dir;buildWeek();}
function buildMonth(){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth();
  document.getElementById('month-label').textContent=y+'年'+(m+1)+'月';
  const days=['日','月','火','水','木','金','土'];
  const hdr=document.getElementById('month-hdr');hdr.innerHTML='';
  days.forEach(d=>{const el=document.createElement('div');el.className='month-day-hdr';el.textContent=d;hdr.appendChild(el);});
  const grid=document.getElementById('month-grid');grid.innerHTML='';
  const first=new Date(y,m,1),last=new Date(y,m+1,0),today=new Date();
  for(let i=0;i<first.getDay();i++){const c=document.createElement('div');c.className='month-cell other-month';grid.appendChild(c);}
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d);
    const dateStr=fmtDate(date);
    const cell=document.createElement('div');
    cell.className='month-cell'+(date.toDateString()===today.toDateString()?' today':'');
    const slots=allSlots.filter(s=>getDate(s)===dateStr);
    let dots='<div class="month-dots">';
    const sk_all=slots.map(s=>getStore(s));
    if(slots.some(s=>s.lesson_type==='indoor')&&(sk_all.includes('kyoto')||sk_all.includes('both')))
      dots+=`<div class="month-dot" style="background:var(--kyoto)"></div>`;
    if(slots.some(s=>s.lesson_type==='indoor')&&(sk_all.includes('fushimi')||sk_all.includes('both')))
      dots+=`<div class="month-dot" style="background:var(--fushimi)"></div>`;
    if(slots.some(s=>s.lesson_type==='round'))
      dots+=`<div class="month-dot" style="background:var(--round-border)"></div>`;
    dots+='</div>';
    cell.innerHTML=`<div class="month-date">${d}</div>${dots}`;
    cell.onclick=()=>{
      const today2=new Date(),mon=new Date(today2);
      mon.setDate(today2.getDate()-today2.getDay()+1);
      weekOffset=Math.floor((date-mon)/604800000);
      switchView('week');
    };
    grid.appendChild(cell);
  }
}
function moveMonth(dir){currentMonth.setMonth(currentMonth.getMonth()+dir);buildMonth();}
function openModal(dateStr,hour){
  modalDate=dateStr;
  const d=new Date(dateStr);
  document.getElementById('modal-date').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日'+(hour!==undefined?' '+hour+':00':'');
  const existing=allSlots.filter(s=>getDate(s)===dateStr);
  let html='';
  if(existing.length){
    html='<div style="margin-bottom:12px;"><div class="sec-title" style="margin-top:0;">登録済み</div>';
    existing.forEach(s=>{
      const confirmed=s.status==='booked';
      const sk=getStore(s);
      const sl=sk==='both'?'両店舗':sk==='kyoto'?'京都店':'伏見店';
      html+=`<div class="exist-item"><div><div class="exist-type">${s.lesson_type==='round'?'⛳ ラウンド':'🏌 インドア'} ${sl}</div><div class="exist-detail">${s.lesson_type==='round'?(s.block_from||'8')+'〜'+(s.block_to||'17')+'時':getHour(s)+'時'}</div></div>${confirmed?'<span style="font-size:11px;color:var(--red);font-weight:700;">確定済</span>':`<button class="btn-del" onclick="deleteSlot('${s.id}')">削除</button>`}</div>`;
    });
    html+='</div>';
  }
  document.getElementById('exist-wrap').innerHTML=html;
  selStore=localStorage.getItem('gc_store')||null;
  selHours=hour!==undefined?[hour]:[];
  document.getElementById('tog-indoor').checked=hour!==undefined;
  document.getElementById('tog-round').checked=false;
  document.getElementById('sec-indoor').style.display=hour!==undefined?'block':'none';
  document.getElementById('sec-round').style.display='none';
  ['kyoto','fushimi','both'].forEach(k=>{document.getElementById('chip-'+k).className='store-chip'+(selStore===k?' sel-'+k:'');});
  buildHourGrid();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function pickStore(k){
  selStore=k;
  ['kyoto','fushimi','both'].forEach(id=>{document.getElementById('chip-'+id).className='store-chip'+(id===k?' sel-'+id:'');});
  buildHourGrid();
}
function onToggle(type,on){
  document.getElementById('sec-'+type).style.display=on?'block':'none';
  if(type==='indoor')buildHourGrid();
}
function buildHourGrid(){
  const grid=document.getElementById('hour-grid');grid.innerHTML='';
  for(let h=8;h<=21;h++){
    const chip=document.createElement('div');
    const confirmed=allSlots.some(s=>getDate(s)===modalDate&&s.lesson_type==='indoor'&&getHour(s)===h&&s.status==='booked');
    if(confirmed){chip.className='hour-chip confirmed';chip.textContent=h+':00 確';}
    else{
      chip.className='hour-chip'+(selHours.includes(h)?' sel':'');
      chip.textContent=h+':00';
      chip.onclick=()=>{
        if(!selStore){showToast('先に店舗を選んでください');return;}
        chip.classList.toggle('sel');
        if(selHours.includes(h))selHours=selHours.filter(x=>x!==h);else selHours.push(h);
      };
    }
    grid.appendChild(chip);
  }
}
function buildRoundOpts(){
  const s=document.getElementById('round-start'),e=document.getElementById('round-end');
  for(let h=5;h<=21;h++)s.innerHTML+=`<option value="${h}">${h}:00</option>`;
  for(let h=6;h<=22;h++)e.innerHTML+=`<option value="${h}">${h}:00</option>`;
  s.value=8;e.value=17;
}
async function saveSlot(){
  if(!selStore){showToast('店舗を選んでください');return;}
  const indoorOn=document.getElementById('tog-indoor').checked;
  const roundOn=document.getElementById('tog-round').checked;
  if(!indoorOn&&!roundOn){showToast('インドアかラウンドをONに');return;}
  const saves=[];
  if(indoorOn){
    if(!selHours.length){showToast('時間を選んでください');return;}
    selHours.forEach(h=>saves.push({coach_id:coachId,date:modalDate,lesson_type:'indoor',store_key:selStore,start_time:String(h),status:'available'}));
  }
  if(roundOn){
    const rs=parseInt(document.getElementById('round-start').value);
    const re=parseInt(document.getElementById('round-end').value);
    if(re<=rs){showToast('終了は開始より後に');return;}
    saves.push({coach_id:coachId,date:modalDate,lesson_type:'round',store_key:selStore,block_from:String(rs),block_to:String(re),status:'available'});
  }
  try{
    const {error}=await sb.from('schedules').insert(saves);
    if(error)throw error;
    saves.forEach(s=>{if(!s.id){s.id='sv-'+Date.now();allSlots.push(s);}});
  }catch(e){
    saves.forEach(s=>{s.id='local-'+Date.now()+Math.random();allSlots.push(s);});
  }
  showToast('保存しました！');closeModal();buildWeek();
}
async function deleteSlot(id){
  if(!confirm('削除しますか？'))return;
  try{await sb.from('schedules').delete().eq('id',id);}catch(e){}
  allSlots=allSlots.filter(s=>s.id!==id);
  closeModal();buildWeek();showToast('削除しました');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
