<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach — スケジュールカレンダー</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#1D9E75;--gd:#085041;--gl:#E1F5EE;
  --accent:#5dd4a8;--gold:#F59E0B;--red:#E24B4A;
  --border:#e0ece6;--text:#1a2e24;--muted:#6b8a78;
  --kyoto:#1D9E75;--fushimi:#1976D2;
  --round-bd:#F59E0B;--round-bg:#FFFBEB;
}
html,body{min-height:100%;background:#f0f7f4;font-family:'Noto Sans JP',sans-serif;color:var(--text);}
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.hdr-logo{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:900;color:var(--gd);}
.hdr-logo span{color:var(--accent);}
.view-tabs{display:flex;gap:5px;padding:7px 12px;background:#f0f7f4;}
.view-tab{flex:1;padding:9px;font-size:12px;font-weight:700;text-align:center;border-radius:9px;border:none;background:transparent;color:var(--muted);cursor:pointer;}
.view-tab.active{background:var(--g);color:#fff;}
.legend{display:flex;gap:8px;flex-wrap:wrap;padding:6px 12px;background:#fff;border-bottom:1px solid var(--border);font-size:10px;}
.leg{display:flex;align-items:center;gap:3px;color:var(--muted);}
.ld{width:10px;height:10px;border-radius:2px;}
.content{padding:0 0 72px;}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f0f7f4;}
.wnbtn{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--gd);}
.wlbl{font-size:12px;font-weight:700;color:var(--gd);}

/* カレンダー本体 */
.cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cal{display:flex;min-width:480px;}
.tc-col{flex-shrink:0;width:34px;}
.tc-hdr{height:34px;border-bottom:1px solid var(--border);background:#f0f7f4;}
.tc-cell{height:36px;border-bottom:1px solid var(--border);background:#f0f7f4;text-align:right;font-size:8px;color:var(--muted);padding:2px 3px 0;font-weight:600;}
.day-col{flex:1;min-width:0;display:flex;flex-direction:column;}
.day-hdr{height:34px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);background:#f8fbf9;text-align:center;font-size:9px;font-weight:700;color:var(--gd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.day-hdr.tdy{background:var(--gl);}
.day-hdr.sun{color:var(--red);}
.day-hdr.sat{color:var(--fushimi);}
.today-num{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--g);color:#fff;border-radius:50%;font-size:9px;font-weight:900;}
.cell{height:36px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:2px;background:#fff;cursor:pointer;overflow:hidden;display:flex;flex-direction:row;gap:1px;align-items:center;}
.cell.tdy{background:#fffef5;}
.cell:active{background:#f0faf5;}

/* スロット：左右並び */
.sl{border-radius:3px;padding:2px 0;font-size:9px;font-weight:700;color:#fff;text-align:center;flex:1;min-width:0;position:relative;overflow:hidden;white-space:nowrap;}
.ky{background:var(--kyoto);}
.fu{background:var(--fushimi);}
.sl.cfm{outline:1.5px solid var(--red);}
.cfms{position:absolute;top:0;right:1px;background:var(--red);color:#fff;border-radius:50%;width:11px;height:11px;font-size:6px;display:flex;align-items:center;justify-content:center;font-weight:900;}
.sl.cancelled{background:#ccc;color:#999;text-decoration:line-through;font-size:8px;flex:1;min-width:0;}

/* ラウンド枠 */
.rb{border:2px solid var(--round-bd);border-radius:8px;background:var(--round-bg);margin:0 1px 0;padding:1px;display:flex;flex-direction:column;flex-shrink:0;}
.rb.cfm{border-color:var(--red);background:#FFF0F0;}
.rl{font-size:8px;font-weight:700;color:#92400E;padding:1px 2px 2px;display:flex;align-items:center;gap:2px;white-space:nowrap;overflow:hidden;}
.rl.cfm{color:var(--red);}
.rcbdg{background:var(--red);color:#fff;border-radius:50%;width:11px;height:11px;font-size:6px;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;}
.rc{height:36px;border-bottom:1px solid rgba(245,158,11,0.25);padding:2px;overflow:hidden;cursor:pointer;display:flex;flex-direction:row;gap:1px;align-items:center;}
.rc.cfm{border-bottom-color:rgba(226,75,74,0.15);background:#FFF5F5;}
.rc:last-child{border-bottom:none;}

/* 月ビュー */
.month-wrap{padding:8px 12px 0;}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.mnbtn{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--gd);}
.mlbl{font-size:13px;font-weight:700;color:var(--gd);}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mdhdr{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;}
.mdhdr.sun{color:var(--red);}
.mdhdr.sat{color:var(--fushimi);}
.mcell{min-height:52px;background:#fff;border-radius:7px;border:1px solid var(--border);padding:3px;cursor:pointer;transition:border-color .15s;}
.mcell:hover{border-color:var(--g);}
.mcell.today{border-color:var(--g);border-width:2px;}
.mcell.other{opacity:.4;cursor:default;}
.mdate{font-size:10px;font-weight:700;margin-bottom:2px;}
.mcell.today .mdate{color:var(--g);}
.mcell.sun .mdate{color:var(--red);}
.mcell.sat .mdate{color:var(--fushimi);}
.mdots{display:flex;gap:2px;flex-wrap:wrap;}
.mdot{width:6px;height:6px;border-radius:50%;}
.mhint{font-size:10px;color:var(--muted);text-align:center;margin-top:6px;}

/* モーダル */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;align-items:flex-end;justify-content:center;}
.mbg.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:18px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;}
.mttl{font-size:14px;font-weight:700;color:var(--gd);margin-bottom:2px;}
.mdt{font-size:12px;color:var(--muted);margin-bottom:12px;}
.erow{background:#f8fbf9;border-radius:8px;padding:9px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
.et{font-size:11px;font-weight:700;color:var(--gd);}
.ed{font-size:10px;color:var(--muted);}
.dbtn{padding:5px 10px;background:#fff0f0;color:var(--red);border:1px solid var(--red);border-radius:7px;font-size:10px;cursor:pointer;font-family:inherit;}
.stl{font-size:11px;font-weight:700;color:var(--text);margin:10px 0 5px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:7px 14px;border-radius:18px;border:2px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);}
.chip.sk{background:var(--kyoto);border-color:var(--kyoto);color:#fff;}
.chip.sf{background:var(--fushimi);border-color:var(--fushimi);color:#fff;}
.chip.sb{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.togrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.toglbl{font-size:12px;font-weight:700;}
.tog{position:relative;width:44px;height:24px;}
.tog input{opacity:0;width:0;height:0;}
.togsl{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.3s;}
.togsl:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.tog input:checked+.togsl{background:var(--g);}
.tog input:checked+.togsl:before{transform:translateX(20px);}
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:7px;}
.hchip{padding:8px 3px;border-radius:7px;border:1px solid var(--border);font-size:10px;text-align:center;cursor:pointer;}
.hchip.sel{background:var(--g);border-color:var(--g);color:#fff;font-weight:700;}
.hchip.cfmd{background:#ffebee;border-color:var(--red);color:var(--red);cursor:not-allowed;}
.trow{display:flex;align-items:center;gap:6px;margin-top:7px;}
.tsel{flex:1;padding:8px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:11px;outline:none;}
.sbtn{width:100%;padding:13px;background:var(--g);color:#fff;border:none;border-radius:11px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:14px;}
.cbtn{width:100%;padding:11px;background:#f0f0f0;color:var(--muted);border:none;border-radius:11px;font-family:inherit;font-size:12px;cursor:pointer;margin-top:6px;}
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);background:var(--gd);color:#fff;padding:9px 20px;border-radius:18px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.btm{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:9px 14px;}
.btmbtn{width:100%;padding:11px;background:#f0f7f4;color:var(--gd);border:1.5px solid var(--g);border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">My<span>Coach</span></div>
</div>
<div class="view-tabs">
  <button class="view-tab active" id="tab-week" onclick="switchView('week')">週ビュー</button>
  <button class="view-tab" id="tab-month" onclick="switchView('month')">月ビュー</button>
</div>
<div class="legend">
  <div class="leg"><div class="ld" style="background:var(--kyoto)"></div>京都</div>
  <div class="leg"><div class="ld" style="background:var(--fushimi)"></div>伏見</div>
  <div class="leg"><div class="ld" style="background:var(--round-bd);border:1.5px solid var(--round-bd);width:13px;border-radius:2px;"></div>ラウンド受付中</div>
  <div class="leg"><div class="ld" style="background:var(--red);border:1.5px solid var(--red);width:13px;border-radius:2px;"></div>ラウンド確定</div>
  <div class="leg"><div class="ld" style="background:#ccc"></div>キャンセル</div>
</div>
<div class="content">
  <div id="view-week">
    <div class="week-nav">
      <button class="wnbtn" onclick="moveWeek(-1)">‹ 前</button>
      <div class="wlbl" id="week-lbl"></div>
      <button class="wnbtn" onclick="moveWeek(1)">次 ›</button>
    </div>
    <div class="cal-scroll"><div id="cal-wrap"></div></div>
  </div>
  <div id="view-month" style="display:none">
    <div class="month-wrap">
      <div class="month-nav">
        <button class="mnbtn" onclick="moveMonth(-1)">‹</button>
        <div class="mlbl" id="month-lbl"></div>
        <button class="mnbtn" onclick="moveMonth(1)">›</button>
      </div>
      <div class="mgrid" id="month-hdr"></div>
      <div class="mgrid" id="month-grid" style="margin-top:2px;"></div>
      <div class="mhint">日付タップ → その週の週ビューへ</div>
    </div>
  </div>
</div>

<div class="mbg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mttl">スケジュール設定</div>
    <div class="mdt" id="mdt"></div>
    <div id="exist-wrap"></div>
    <div class="stl">① 店舗を選択</div>
    <div class="chips">
      <div class="chip" id="chip-kyoto" onclick="pickStore('kyoto')">京都店</div>
      <div class="chip" id="chip-fushimi" onclick="pickStore('fushimi')">伏見店</div>
      <div class="chip" id="chip-both" onclick="pickStore('both')">両店舗</div>
    </div>
    <div class="togrow" style="margin-top:10px;">
      <div class="toglbl">🏌 インドアレッスン</div>
      <label class="tog"><input type="checkbox" id="tog-i" onchange="onTog('i',this.checked)"><span class="togsl"></span></label>
    </div>
    <div id="sec-i" style="display:none">
      <p style="font-size:10px;color:var(--muted);margin-top:3px;">店舗選択 → 時間をタップ（複数可）</p>
      <div class="hgrid" id="hgrid"></div>
    </div>
    <div class="togrow">
      <div class="toglbl">⛳ ラウンド</div>
      <label class="tog"><input type="checkbox" id="tog-r" onchange="onTog('r',this.checked)"><span class="togsl"></span></label>
    </div>
    <div id="sec-r" style="display:none">
      <p style="font-size:10px;color:var(--muted);margin-top:3px;">ラウンドの時間帯を設定</p>
      <div class="trow">
        <span style="font-size:11px;font-weight:700;">開始</span>
        <select class="tsel" id="rs"></select>
        <span style="font-size:11px;font-weight:700;">〜 終了</span>
        <select class="tsel" id="re"></select>
      </div>
    </div>
    <button class="sbtn" onclick="saveSlot()">✅ 保存する</button>
    <button class="cbtn" onclick="closeModal()">閉じる</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="btm"><button class="btmbtn" onclick="location.href='coach.html'">← コーチ画面に戻る</button></div>

<script>
const SUPABASE_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}});
const BASE='https://soft-speculoos-5ef188.netlify.app/';
const HOURS=[];for(let h=8;h<=22;h++)HOURS.push(h);
let coachId=null,currentMonth=new Date(),allSlots=[],modalDate=null,selStore=null,selHours=[];
// 表示中の週の日曜日を直接保持
let currentWeekSun=(function(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-d.getDay());return d;})();

(async()=>{
  const us=new URLSearchParams(location.search).get('store');
  if(us)localStorage.setItem('gc_store',us);
  const targetDate=new URLSearchParams(location.search).get('date');
  if(targetDate){
    const d=new Date(targetDate);
    d.setHours(0,0,0,0);
    currentWeekSun=new Date(d.getFullYear(),d.getMonth(),d.getDate()-d.getDay());
  }
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.replace(BASE+'index.html');return;}
  coachId=session.user.id;
  buildRoundOpts();
  await loadSlots();
  buildWeek();
})();

async function loadSlots(){
  try{const {data}=await sb.from('schedules').select('*').eq('coach_id',coachId);allSlots=data||[];}
  catch(e){allSlots=[];}
}

function switchView(v){
  document.getElementById('view-week').style.display=v==='week'?'block':'none';
  document.getElementById('view-month').style.display=v==='month'?'block':'none';
  document.getElementById('tab-week').classList.toggle('active',v==='week');
  document.getElementById('tab-month').classList.toggle('active',v==='month');
  if(v==='month')buildMonth();
  if(v==='week')buildWeek();
}

function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function gd(s){return s.date||s.slot_date||'';}
function gs(s){return s.store_key||s.store_id||'kyoto';}
function gh(s){return parseInt(s.start_time||s.slot_hour||0);}

function buildWeek(){
  const today=new Date();today.setHours(0,0,0,0);
  const dates=[];
  for(let i=0;i<7;i++){
    const d=new Date(currentWeekSun);
    d.setDate(currentWeekSun.getDate()+i);
    dates.push(d);
  }
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('week-lbl').textContent=
    (dates[0].getMonth()+1)+'/'+dates[0].getDate()+'〜'+(dates[6].getMonth()+1)+'/'+dates[6].getDate();

  const wrap=document.getElementById('cal-wrap');
  wrap.innerHTML='';
  const cal=document.createElement('div');
  cal.className='cal';

  // 時間列
  const tcol=document.createElement('div');tcol.className='tc-col';
  const thdr=document.createElement('div');thdr.className='tc-hdr';tcol.appendChild(thdr);
  HOURS.forEach(h=>{const c=document.createElement('div');c.className='tc-cell';c.textContent=h+':00';tcol.appendChild(c);});
  cal.appendChild(tcol);

  // 各日列
  dates.forEach((d,di)=>{
    const ds=fd(d);
    const isToday=d.toDateString()===today.toDateString();
    const dow=d.getDay();
    const col=document.createElement('div');col.className='day-col';

    // ヘッダー
    const hdr=document.createElement('div');
    hdr.className='day-hdr'+(isToday?' tdy':'')+(dow===0?' sun':dow===6?' sat':'');
    const num=isToday?`<div class="today-num">${d.getDate()}</div>`:d.getDate();
    hdr.innerHTML=days[di]+'<br>'+num;
    col.appendChild(hdr);

    // この日のラウンド情報
    const rounds=allSlots.filter(s=>gd(s)===ds&&s.lesson_type==='round');

    // ラウンド時間帯の計算
    let roundFrom=-1,roundTo=-1,roundConfirmed=false,roundLabel='';
    if(rounds.length>0){
      const r=rounds[0];
      roundFrom=parseInt(r.block_from||8);
      roundTo=parseInt(r.block_to||17);
      roundConfirmed=r.status==='booked';
      const sk=gs(r),sl=sk==='both'?'京・伏':sk==='kyoto'?'京都':'伏見';
      roundLabel=`⛳ ${sl} ${roundFrom}〜${roundTo}時`;
    }

    if(roundFrom>=0){
      // ラウンド前の通常セル
      for(let h=HOURS[0];h<roundFrom;h++){
        const cell=mkCell(ds,h,isToday,false,false);col.appendChild(cell);
      }
      // ラウンド枠（大きな角丸枠）
      const rb=document.createElement('div');
      rb.className='rb'+(roundConfirmed?' cfm':'');
      const rl=document.createElement('div');
      rl.className='rl'+(roundConfirmed?' cfm':'');
      rl.textContent=roundLabel;
      if(roundConfirmed){const b=document.createElement('div');b.className='rcbdg';b.textContent='確';rl.appendChild(b);}
      rb.appendChild(rl);
      // ラウンド時間帯のセル
      for(let h=roundFrom;h<roundTo;h++){
        const rc=document.createElement('div');
        rc.className='rc'+(roundConfirmed?' cfm':'');
        const indoors=allSlots.filter(s=>gd(s)===ds&&s.lesson_type==='indoor'&&gh(s)===h);
        indoors.forEach(s=>{
          const keys=gs(s)==='both'?['kyoto','fushimi']:[gs(s)];
          keys.forEach(k=>{
            const el=document.createElement('div');
            if(roundConfirmed){
              el.className='sl cancelled';el.textContent=k==='kyoto'?'京':'伏';
            } else {
              el.className='sl '+(k==='kyoto'?'ky':'fu')+(s.status==='booked'?' cfm':'');
              el.textContent=k==='kyoto'?'京':'伏';
              if(s.status==='booked'){const st=document.createElement('div');st.className='cfms';st.textContent='確';el.appendChild(st);}
            }
            rc.appendChild(el);
          });
        });
        rc.onclick=()=>openModal(ds,h);
        rb.appendChild(rc);
      }
      col.appendChild(rb);
      // ラウンド後の通常セル
      for(let h=roundTo;h<=HOURS[HOURS.length-1];h++){
        const cell=mkCell(ds,h,isToday,false,false);col.appendChild(cell);
      }
    } else {
      // ラウンドなし：全部通常セル
      HOURS.forEach(h=>{const cell=mkCell(ds,h,isToday,false,false);col.appendChild(cell);});
    }
    cal.appendChild(col);
  });
  wrap.appendChild(cal);
}

function mkCell(ds,h,isToday,inRound,roundCfm){
  const cell=document.createElement('div');
  cell.className='cell'+(isToday?' tdy':'');
  const indoors=allSlots.filter(s=>gd(s)===ds&&s.lesson_type==='indoor'&&gh(s)===h);
  indoors.forEach(s=>{
    const keys=gs(s)==='both'?['kyoto','fushimi']:[gs(s)];
    keys.forEach(k=>{
      const el=document.createElement('div');
      el.className='sl '+(k==='kyoto'?'ky':'fu')+(s.status==='booked'?' cfm':'');
      el.textContent=k==='kyoto'?'京':'伏';
      if(s.status==='booked'){const st=document.createElement('div');st.className='cfms';st.textContent='確';el.appendChild(st);}
      cell.appendChild(el);
    });
  });
  cell.onclick=()=>openModal(ds,h);
  return cell;
}

function moveWeek(dir){
  currentWeekSun=new Date(currentWeekSun.getFullYear(),currentWeekSun.getMonth(),currentWeekSun.getDate()+dir*7);
  buildWeek();
}

function buildMonth(){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth();
  document.getElementById('month-lbl').textContent=y+'年'+(m+1)+'月';
  const days=['日','月','火','水','木','金','土'];
  const hdr=document.getElementById('month-hdr');hdr.innerHTML='';
  days.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='mdhdr'+(i===0?' sun':i===6?' sat':'');
    el.textContent=d;hdr.appendChild(el);
  });
  const grid=document.getElementById('month-grid');grid.innerHTML='';
  const first=new Date(y,m,1),last=new Date(y,m+1,0),today=new Date();
  for(let i=0;i<first.getDay();i++){const c=document.createElement('div');c.className='mcell other';grid.appendChild(c);}
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d),ds=fd(date);
    const dow=date.getDay();
    const cell=document.createElement('div');
    cell.className='mcell'+(date.toDateString()===today.toDateString()?' today':'')+(dow===0?' sun':dow===6?' sat':'');
    const slots=allSlots.filter(s=>gd(s)===ds);
    const sks=slots.map(s=>gs(s));
    let dots='<div class="mdots">';
    if(slots.some(s=>s.lesson_type==='indoor')&&(sks.includes('kyoto')||sks.includes('both')))
      dots+=`<div class="mdot" style="background:var(--kyoto)"></div>`;
    if(slots.some(s=>s.lesson_type==='indoor')&&(sks.includes('fushimi')||sks.includes('both')))
      dots+=`<div class="mdot" style="background:var(--fushimi)"></div>`;
    if(slots.some(s=>s.lesson_type==='round'))
      dots+=`<div class="mdot" style="background:var(--round-bd)"></div>`;
    dots+='</div>';
    cell.innerHTML=`<div class="mdate">${d}</div>${dots}`;
    // 月ビューの日付タップ → その週の週ビューへ
    (function(cy,cm,cd){
      cell.onclick=()=>{
        const clicked=new Date(cy,cm,cd);
        clicked.setHours(0,0,0,0);
        // setDateで負の値も正しく前月に繰り上がる
        const sun=new Date(clicked);
        sun.setDate(clicked.getDate()-clicked.getDay());
        currentWeekSun=sun;
        switchView('week');
      };
    })(y,m,d);
    grid.appendChild(cell);
  }
}
function moveMonth(dir){currentMonth.setMonth(currentMonth.getMonth()+dir);buildMonth();}

function openModal(ds,hour){
  modalDate=ds;
  const d=new Date(ds);
  document.getElementById('mdt').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日'+(hour!==undefined?' '+hour+':00':'');

  // その時間・その枠だけ表示（hourが指定されている場合はその時間のスロットのみ）
  let existing;
  if(hour!==undefined){
    existing=allSlots.filter(s=>gd(s)===ds&&(
      (s.lesson_type==='indoor'&&gh(s)===hour)||
      (s.lesson_type==='round'&&parseInt(s.block_from||8)<=hour&&hour<parseInt(s.block_to||17))
    ));
  } else {
    existing=allSlots.filter(s=>gd(s)===ds);
  }

  let html='';
  if(existing.length){
    html='<div style="margin-bottom:10px;"><div class="stl" style="margin-top:0;">'+(hour!==undefined?hour+':00 の登録済み':'登録済み')+'</div>';
    existing.forEach(s=>{
      const cfm=s.status==='booked';
      const sk=gs(s),sl=sk==='both'?'両店舗':sk==='kyoto'?'京都店':'伏見店';
      html+=`<div class="erow"><div><div class="et">${s.lesson_type==='round'?'⛳ ラウンド':'🏌 インドア'} ${sl}</div><div class="ed">${s.lesson_type==='round'?(s.block_from||'8')+'〜'+(s.block_to||'17')+'時':gh(s)+'時'}</div></div>${cfm?'<span style="font-size:10px;color:var(--red);font-weight:700;">確定済</span>':`<button class="dbtn" onclick="delSlot('${s.id}')">削除</button>`}</div>`;
    });
    html+='</div>';
  }
  document.getElementById('exist-wrap').innerHTML=html;
  selStore=localStorage.getItem('gc_store')||null;
  selHours=hour!==undefined?[hour]:[];
  document.getElementById('tog-i').checked=hour!==undefined;
  document.getElementById('tog-r').checked=false;
  document.getElementById('sec-i').style.display=hour!==undefined?'block':'none';
  document.getElementById('sec-r').style.display='none';
  ['kyoto','fushimi','both'].forEach(k=>{
    document.getElementById('chip-'+k).className='chip'+(selStore===k?' s'+(k==='kyoto'?'k':k==='fushimi'?'f':'b'):'');
  });
  buildHGrid();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function pickStore(k){
  selStore=k;
  ['kyoto','fushimi','both'].forEach(id=>{
    document.getElementById('chip-'+id).className='chip'+(id===k?' s'+(id==='kyoto'?'k':id==='fushimi'?'f':'b'):'');
  });
  buildHGrid();
}
function onTog(t,on){
  document.getElementById('sec-'+t).style.display=on?'block':'none';
  if(t==='i')buildHGrid();
}
function buildHGrid(){
  const g=document.getElementById('hgrid');g.innerHTML='';
  for(let h=8;h<=21;h++){
    const c=document.createElement('div');
    const cfm=allSlots.some(s=>gd(s)===modalDate&&s.lesson_type==='indoor'&&gh(s)===h&&s.status==='booked');
    if(cfm){c.className='hchip cfmd';c.textContent=h+':00 確';}
    else{
      c.className='hchip'+(selHours.includes(h)?' sel':'');c.textContent=h+':00';
      c.onclick=()=>{
        if(!selStore){showToast('先に店舗を選んでください');return;}
        c.classList.toggle('sel');
        if(selHours.includes(h))selHours=selHours.filter(x=>x!==h);else selHours.push(h);
      };
    }
    g.appendChild(c);
  }
}
function buildRoundOpts(){
  const s=document.getElementById('rs'),e=document.getElementById('re');
  for(let h=5;h<=21;h++)s.innerHTML+=`<option value="${h}">${h}:00</option>`;
  for(let h=6;h<=22;h++)e.innerHTML+=`<option value="${h}">${h}:00</option>`;
  s.value=8;e.value=17;
}
async function saveSlot(){
  if(!selStore){showToast('店舗を選んでください');return;}
  const io=document.getElementById('tog-i').checked;
  const ro=document.getElementById('tog-r').checked;
  if(!io&&!ro){showToast('インドアかラウンドをONに');return;}
  const saves=[];
  if(io){
    if(!selHours.length){showToast('時間を選んでください');return;}
    selHours.forEach(h=>saves.push({coach_id:coachId,date:modalDate,lesson_type:'indoor',store_key:selStore,start_time:String(h),status:'available'}));
  }
  if(ro){
    const rs2=parseInt(document.getElementById('rs').value);
    const re2=parseInt(document.getElementById('re').value);
    if(re2<=rs2){showToast('終了は開始より後に');return;}
    saves.push({coach_id:coachId,date:modalDate,lesson_type:'round',store_key:selStore,block_from:String(rs2),block_to:String(re2),status:'available'});
  }
  try{
    const {error}=await sb.from('schedules').insert(saves);
    if(error)throw error;await loadSlots();
  }catch(e){saves.forEach(s=>{s.id='local-'+Date.now()+Math.random();allSlots.push(s);});}
  showToast('保存しました！');closeModal();buildWeek();
}
async function delSlot(id){
  if(!confirm('削除しますか？'))return;
  try{await sb.from('schedules').delete().eq('id',id);}catch(e){}
  allSlots=allSlots.filter(s=>s.id!==id);closeModal();buildWeek();showToast('削除しました');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
