<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach — スケジュールカレンダー</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#1D9E75;--gd:#085041;--gl:#E1F5EE;
  --accent:#5dd4a8;--gold:#BA7517;--red:#E24B4A;
  --blue:#1976D2;--lb:#E3F2FD;
  --border:#e0ece6;--text:#1a2e24;--muted:#6b8a78;--bg:#f0f7f4;
}
html,body{background:var(--bg);}
body{font-family:'Noto Sans JP',sans-serif;color:var(--text);}
.header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;}
.header-logo{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:900;color:var(--gd);}
.header-logo span{color:var(--accent);}
.back-btn{font-size:12px;color:var(--g);background:var(--gl);border:1px solid var(--g);padding:5px 12px;border-radius:20px;cursor:pointer;text-decoration:none;}
.main{margin-top:56px;padding:14px;padding-bottom:80px;}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,0.06);}

/* 凡例 */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;padding:8px 10px;background:var(--bg);border-radius:10px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text);}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* 週ナビ */
.week-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.week-nav-btn{background:#fff;border:1px solid var(--border);border-radius:8px;padding:5px 14px;cursor:pointer;font-size:16px;color:var(--gd);}
.week-nav-label{font-size:13px;font-weight:700;color:var(--gd);}

/* 週グリッド */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day-col{display:flex;flex-direction:column;}
.day-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.day-hdr.sun{color:var(--red);}
.day-hdr.sat{color:var(--blue);}
.day-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin:0 auto 6px;border:1px solid transparent;color:var(--text);}
.day-num.sun{color:var(--red);background:#fff0f0;border-color:var(--red);}
.day-num.sat{color:var(--blue);border-color:var(--blue);}
.day-num.today{background:var(--g);color:#fff;border-color:var(--g);}

/* スロット */
.slot{border-radius:5px;padding:3px 4px;font-size:9px;font-weight:700;text-align:center;margin-bottom:3px;cursor:pointer;}
.slot.kyoto{background:var(--g);color:#fff;}
.slot.fushimi{background:var(--blue);color:#fff;}
.slot.booked{background:var(--red);color:#fff;}

/* ラウンド枠（パターン①） */
.round-wrap{border:2px solid var(--gold);border-radius:8px;padding:4px;margin-bottom:3px;background:#FFF8E7;}
.round-label{font-size:9px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:3px;}
.round-divider{border-top:1px dashed var(--gold);margin:3px 0;}
/* ラウンドのみ（インドアなし） */
.round-only{border:1.5px solid var(--gold);border-radius:8px;padding:5px 4px;background:#FFF8E7;text-align:center;}
.round-only-label{font-size:9px;font-weight:700;color:var(--gold);}
.round-only-sub{font-size:8px;color:#5a3a00;margin-top:2px;}

/* ポップアップ */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end;justify-content:center;}
.popup-overlay.open{display:flex;}
.popup{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:75vh;overflow-y:auto;}
.popup-title{font-size:15px;font-weight:700;color:var(--gd);margin-bottom:12px;}
.popup-item{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.popup-item-type{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:4px;}
.type-kyoto{background:var(--gl);color:var(--gd);}
.type-fushimi{background:var(--lb);color:var(--blue);}
.type-round-k{background:#fff3cd;color:var(--gold);}
.type-round-f{background:#f3e8fd;color:#7c3aed;}
.type-booked{background:#ffe0e0;color:var(--red);}
.popup-item-time{font-size:13px;font-weight:700;color:var(--text);}
.btn-delete{width:100%;padding:7px;background:#fff0f0;color:var(--red);border:1px solid var(--red);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;}
.popup-close{width:100%;padding:11px;background:#f0f0f0;color:var(--muted);border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}

/* 月間切り替えタブ */
.view-tabs{display:flex;gap:6px;margin-bottom:12px;}
.view-tab{flex:1;padding:8px;border:1px solid var(--border);border-radius:10px;background:#fff;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;}
.view-tab.active{background:var(--g);color:#fff;border-color:var(--g);}

/* 月間カレンダー */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;}
.cal-cell{min-height:52px;border-radius:8px;border:1px solid var(--border);padding:4px;background:#fff;cursor:pointer;}
.cal-cell.today{border-color:var(--g);border-width:2px;}
.cal-cell.other-month{opacity:0.3;}
.cal-date{font-size:11px;font-weight:700;color:var(--text);}
.cal-cell.today .cal-date{color:var(--g);}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* 登録・戻るボタン */
.register-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;margin-bottom:12px;}
.back-home-btn{width:100%;padding:12px;background:#f0f7f4;color:var(--gd);border:1.5px solid var(--g);border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">My<span>Coach</span></div>
  <a href="https://soft-speculoos-5ef188.netlify.app/coach.html" class="back-btn">← コーチ画面</a>
</div>

<!-- ポップアップ -->
<div class="popup-overlay" id="popup-overlay">
  <div class="popup">
    <div class="popup-title" id="popup-title"></div>
    <div id="popup-items"></div>
    <button class="popup-close" onclick="closePopup()">✕ 閉じる</button>
  </div>
</div>

<div class="main">
  <a href="https://soft-speculoos-5ef188.netlify.app/schedule_register.html" class="register-btn">📝 スケジュールを登録する</a>

  <div class="card">
    <!-- 週/月 切り替え -->
    <div class="view-tabs">
      <button class="view-tab active" id="tab-week" onclick="switchView('week')">週ビュー</button>
      <button class="view-tab" id="tab-month" onclick="switchView('month')">月ビュー</button>
    </div>

    <!-- 凡例 -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--g)"></div>京都・インドア</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>伏見・インドア</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>ラウンド</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>予約済み</div>
    </div>

    <!-- 週ビュー -->
    <div id="view-week">
      <div class="week-nav">
        <button class="week-nav-btn" onclick="moveWeek(-1)">‹ 前の週</button>
        <div class="week-nav-label" id="week-label"></div>
        <button class="week-nav-btn" onclick="moveWeek(1)">次の週 ›</button>
      </div>
      <div class="week-grid" id="week-grid"></div>
    </div>

    <!-- 月ビュー -->
    <div id="view-month" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <button class="week-nav-btn" onclick="moveMonth(-1)">‹</button>
        <div style="font-size:15px;font-weight:700;color:var(--gd);" id="month-label"></div>
        <button class="week-nav-btn" onclick="moveMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-header"></div>
      <div class="cal-grid" id="cal-grid" style="margin-top:3px;"></div>
    </div>
  </div>

  <button class="back-home-btn" onclick="location.href='https://soft-speculoos-5ef188.netlify.app/coach.html'">← コーチ画面に戻る</button>
</div>

<script>
const {createClient}=supabase;
const sb=createClient(
  'https://gojrdnufmueuvkroevut.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw',
  {auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}}
);
const BASE='https://soft-speculoos-5ef188.netlify.app/';
const weekDays=['日','月','火','水','木','金','土'];

let coachId=null;
let scheduleMap={};
let currentWeekStart=getWeekStart(new Date());
let currentMonth=new Date();
let currentView='week';

function getWeekStart(d){
  const d2=new Date(d);
  d2.setDate(d2.getDate()-d2.getDay());
  d2.setHours(0,0,0,0);
  return d2;
}
function toDS(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(d){return (d.getMonth()+1)+'/'+d.getDate()+'（'+weekDays[d.getDay()]+'）';}

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.replace(BASE+'index.html');return;}
  coachId=session.user.id;
  await loadSchedules();
  buildWeek();
})();

async function loadSchedules(){
  scheduleMap={};
  const {data,error}=await sb.from('schedules').select('*').eq('coach_id',coachId);
  if(error||!data)return;
  data.forEach(row=>{
    const key=row.slot_date;
    if(!scheduleMap[key])scheduleMap[key]=[];
    scheduleMap[key].push(row);
  });
}

/* ===== 週ビュー（パターン①） ===== */
function buildWeek(){
  const grid=document.getElementById('week-grid');
  grid.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);
  const endDate=new Date(currentWeekStart);endDate.setDate(endDate.getDate()+6);
  document.getElementById('week-label').textContent=fmtDate(currentWeekStart)+' 〜 '+fmtDate(endDate);

  for(let i=0;i<7;i++){
    const d=new Date(currentWeekStart);d.setDate(d.getDate()+i);
    const ds=toDS(d);
    const isToday=d.toDateString()===today.toDateString();
    const rows=scheduleMap[ds]||[];

    const col=document.createElement('div');
    col.className='day-col';

    // 曜日ヘッダー
    const hdr=document.createElement('div');
    hdr.className='day-hdr'+(i===0?' sun':i===6?' sat':'');
    hdr.textContent=weekDays[i];
    col.appendChild(hdr);

    // 日付数字
    const num=document.createElement('div');
    num.className='day-num'+(isToday?' today':i===0?' sun':i===6?' sat':'');
    num.textContent=d.getDate();
    col.appendChild(num);

    if(rows.length>0){
      // ラウンドとインドアを分離
      const rounds=rows.filter(r=>r.lesson_type==='round');
      const indoors=rows.filter(r=>r.lesson_type==='indoor').sort((a,b)=>a.slot_hour-b.slot_hour);
      const booked=rows.filter(r=>r.status==='booked');

      if(rounds.length>0 && indoors.length>0){
        // パターン①：ラウンド枠内にインドアスロットを重ねる
        const wrap=document.createElement('div');
        wrap.className='round-wrap';
        wrap.onclick=()=>openPopup(ds,d);

        const rlbl=document.createElement('div');
        rlbl.className='round-label';
        const stores=rounds.map(r=>r.store_id==='kyoto'?'京都':'伏見').join('・');
        rlbl.textContent='⛳ ラウンド（'+stores+'）';
        wrap.appendChild(rlbl);

        const divider=document.createElement('div');
        divider.className='round-divider';
        wrap.appendChild(divider);

        indoors.forEach(row=>{
          const s=document.createElement('div');
          s.className='slot '+(row.store_id==='kyoto'?'kyoto':'fushimi');
          s.textContent=row.slot_hour+'時';
          wrap.appendChild(s);
        });
        col.appendChild(wrap);

      } else if(rounds.length>0){
        // ラウンドのみ
        const wrap=document.createElement('div');
        wrap.className='round-only';
        wrap.onclick=()=>openPopup(ds,d);
        const rl=document.createElement('div');rl.className='round-only-label';
        rl.textContent='⛳ ラウンド';
        const rs=document.createElement('div');rs.className='round-only-sub';
        rs.textContent=rounds.map(r=>r.store_id==='kyoto'?'京都':'伏見').join('・')+'　終日';
        wrap.appendChild(rl);wrap.appendChild(rs);
        col.appendChild(wrap);

      } else {
        // インドアのみ（店舗ごとにスロット表示）
        indoors.forEach(row=>{
          const s=document.createElement('div');
          s.className='slot '+(row.status==='booked'?'booked':row.store_id==='kyoto'?'kyoto':'fushimi');
          s.textContent=row.slot_hour+'時';
          s.onclick=()=>openPopup(ds,d);
          col.appendChild(s);
        });
      }

      // 予約済みスロット（別表示）
      booked.filter(r=>r.lesson_type==='indoor').forEach(row=>{
        const s=document.createElement('div');
        s.className='slot booked';
        s.textContent='予約'+row.slot_hour+'時';
        s.onclick=()=>openPopup(ds,d);
        col.appendChild(s);
      });
    }
    grid.appendChild(col);
  }
}

function moveWeek(dir){
  currentWeekStart.setDate(currentWeekStart.getDate()+dir*7);
  buildWeek();
}

/* ===== 月ビュー ===== */
function buildMonth(){
  const year=currentMonth.getFullYear(),month=currentMonth.getMonth();
  document.getElementById('month-label').textContent=year+'年'+(month+1)+'月';
  const hdr=document.getElementById('cal-header');
  hdr.innerHTML='';
  weekDays.forEach(d=>{const e=document.createElement('div');e.className='cal-day-hdr';e.textContent=d;hdr.appendChild(e);});
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const today=new Date();
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  for(let i=0;i<first.getDay();i++){const c=document.createElement('div');c.className='cal-cell other-month';grid.appendChild(c);}
  for(let d=1;d<=last.getDate();d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=new Date(year,month,d).toDateString()===today.toDateString();
    const cell=document.createElement('div');
    cell.className='cal-cell'+(isToday?' today':'');
    const dateEl=document.createElement('div');dateEl.className='cal-date';dateEl.textContent=d;
    cell.appendChild(dateEl);
    const rows=scheduleMap[ds]||[];
    if(rows.length>0){
      const dotsEl=document.createElement('div');dotsEl.className='cal-dots';
      const hasRound=rows.some(r=>r.lesson_type==='round');
      const kyotoIndoor=rows.some(r=>r.lesson_type==='indoor'&&r.store_id==='kyoto');
      const fushimiIndoor=rows.some(r=>r.lesson_type==='indoor'&&r.store_id==='fushimi');
      if(hasRound){const d2=document.createElement('div');d2.className='dot';d2.style.background='var(--gold)';dotsEl.appendChild(d2);}
      if(kyotoIndoor){const d2=document.createElement('div');d2.className='dot';d2.style.background='var(--g)';dotsEl.appendChild(d2);}
      if(fushimiIndoor){const d2=document.createElement('div');d2.className='dot';d2.style.background='var(--blue)';dotsEl.appendChild(d2);}
      cell.appendChild(dotsEl);
    }
    cell.onclick=()=>openPopup(ds,new Date(year,month,d));
    grid.appendChild(cell);
  }
}

function moveMonth(dir){currentMonth.setMonth(currentMonth.getMonth()+dir);buildMonth();}

function switchView(v){
  currentView=v;
  document.getElementById('view-week').style.display=v==='week'?'block':'none';
  document.getElementById('view-month').style.display=v==='month'?'block':'none';
  document.getElementById('tab-week').className='view-tab'+(v==='week'?' active':'');
  document.getElementById('tab-month').className='view-tab'+(v==='month'?' active':'');
  if(v==='month')buildMonth();
}

/* ===== ポップアップ ===== */
function openPopup(dateStr,d){
  const rows=scheduleMap[dateStr]||[];
  document.getElementById('popup-title').textContent='📅 '+(d.getMonth()+1)+'月'+d.getDate()+'日（'+weekDays[d.getDay()]+'）';
  const container=document.getElementById('popup-items');container.innerHTML='';
  if(rows.length===0){
    container.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">登録なし</div>';
  }else{
    // ラウンドを先に表示
    const rounds=rows.filter(r=>r.lesson_type==='round');
    const indoors=rows.filter(r=>r.lesson_type==='indoor').sort((a,b)=>a.slot_hour-b.slot_hour);
    rounds.forEach(row=>{
      const div=document.createElement('div');div.className='popup-item';
      const store=row.store_id==='kyoto'?'京都店':'伏見店';
      const typeClass=row.store_id==='kyoto'?'type-round-k':'type-round-f';
      div.innerHTML=`<span class="popup-item-type ${typeClass}">⛳ ${store}・ラウンド</span>
        <div class="popup-item-time">終日</div>
        ${row.status!=='booked'?`<button class="btn-delete" onclick="deleteSchedule('${row.id}','${dateStr}')">🗑️ 削除</button>`:'<div style="font-size:11px;color:var(--red);margin-top:6px;">予約済み・変更不可</div>'}`;
      container.appendChild(div);
    });
    indoors.forEach(row=>{
      const div=document.createElement('div');div.className='popup-item';
      const store=row.store_id==='kyoto'?'京都店':'伏見店';
      const typeClass=row.store_id==='kyoto'?'type-kyoto':'type-fushimi';
      const statusClass=row.status==='booked'?'type-booked':typeClass;
      div.innerHTML=`<span class="popup-item-type ${statusClass}">🏌 ${store}・インドア${row.status==='booked'?' [予約済み]':''}</span>
        <div class="popup-item-time">⏰ ${row.slot_hour}:00〜${row.slot_hour+1}:00</div>
        ${row.status!=='booked'?`<button class="btn-delete" onclick="deleteSchedule('${row.id}','${dateStr}')">🗑️ 削除</button>`:'<div style="font-size:11px;color:var(--red);margin-top:6px;">予約済み・変更不可</div>'}`;
      container.appendChild(div);
    });
  }
  document.getElementById('popup-overlay').classList.add('open');
}
function closePopup(){document.getElementById('popup-overlay').classList.remove('open');}

async function deleteSchedule(id,dateStr){
  if(!confirm('このスケジュールを削除しますか？'))return;
  const {error}=await sb.from('schedules').delete().eq('id',id);
  if(error){alert('削除に失敗しました：'+error.message);return;}
  if(scheduleMap[dateStr])scheduleMap[dateStr]=scheduleMap[dateStr].filter(r=>r.id!==id);
  closePopup();
  if(currentView==='week')buildWeek();else buildMonth();
}
</script>
</body>
</html>
