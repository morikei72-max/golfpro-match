<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MyCoach 本部 - 予約</title>
<meta name="theme-color" content="#000000">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --main:#65CEA5;
  --main-dark:#3aa57c;
  --main-light:#A8F0D0;
  --bg:#000;
  --line:rgba(101,206,165,0.15);
  --line-strong:rgba(101,206,165,0.3);
  --muted:#7a9a8a;
  --red:#ff8a8a;
  --yellow:#FFD27A;
  --cyan:#5dd4ff;
}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:#000;color:#fff;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 600px 400px at 20% 0%,rgba(101,206,165,0.15) 0%,transparent 60%),radial-gradient(ellipse 400px 300px at 80% 100%,rgba(101,206,165,0.08) 0%,transparent 60%);}

.wrap{position:relative;z-index:1;padding:18px 18px 40px;max-width:480px;margin:0 auto;}

.head{display:flex;align-items:center;gap:12px;padding:8px 4px 18px;}
.back-btn{width:38px;height:38px;background:rgba(101,206,165,0.06);border:1px solid var(--line-strong);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--main);text-decoration:none;font-size:18px;font-weight:600;}
.page-title{flex:1;}
.page-title h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.02em;}
.page-title .sub{font-size:11px;color:var(--muted);margin-top:3px;}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px;}
.kpi{background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:16px;padding:16px;}
.kpi .lab{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:6px;}
.kpi .num{font-size:24px;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-0.02em;}
.kpi .num .u{font-size:12px;color:var(--muted);margin-left:2px;}
.kpi .d{font-size:10px;color:var(--main);margin-top:6px;font-weight:600;}
.kpi .d.warn{color:var(--yellow);}
.kpi .d.dn{color:var(--red);}

.tabs{display:flex;gap:6px;margin-bottom:14px;background:rgba(255,255,255,0.025);border:1px solid var(--line);border-radius:12px;padding:4px;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:max-content;background:none;border:none;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;padding:8px 12px;border-radius:9px;cursor:pointer;white-space:nowrap;}
.tab.on{background:linear-gradient(135deg,#064D3B,#0a6c52);color:#fff;}

/* 日付セレクタ */
.date-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.025);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:14px;}
.date-bar .date-text{font-size:14px;font-weight:700;color:#fff;}
.date-bar .date-nav{display:flex;gap:6px;}
.date-bar button{background:rgba(101,206,165,0.06);border:1px solid var(--line);color:var(--main);font-family:inherit;font-size:13px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;}
.date-bar button:active{background:rgba(101,206,165,0.15);}

.panel{background:rgba(255,255,255,0.025);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;}
.panel-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:14px;display:flex;justify-content:space-between;align-items:baseline;}
.panel-title .meta{font-size:11px;color:var(--main);font-weight:600;}

.row{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.row .l-time{font-size:14px;font-weight:800;color:var(--main);width:60px;text-align:center;line-height:1.2;}
.row .l-time .d{display:block;font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;}
.row .l-info{flex:1;margin-left:10px;min-width:0;}
.row .l-name{font-size:13px;font-weight:700;color:#fff;}
.row .l-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.row .l-amt{font-size:12px;font-weight:800;color:#fff;text-align:right;margin-right:4px;}

.bk-pill{font-size:9px;padding:3px 7px;border-radius:100px;font-weight:700;white-space:nowrap;}
.bk-cfm{background:rgba(101,206,165,0.15);color:var(--main);border:1px solid var(--line-strong);}
.bk-pnd{background:rgba(255,210,122,0.15);color:var(--yellow);border:1px solid rgba(255,210,122,0.3);}
.bk-pay{background:rgba(93,212,255,0.15);color:var(--cyan);border:1px solid rgba(93,212,255,0.3);}
.bk-cxl{background:rgba(255,138,138,0.15);color:var(--red);border:1px solid rgba(255,138,138,0.3);}
.bk-cmp{background:rgba(168,240,208,0.15);color:var(--main-light);border:1px solid rgba(168,240,208,0.3);}

.empty{text-align:center;padding:24px 14px;color:var(--muted);font-size:12px;}
.skeleton{background:linear-gradient(90deg,rgba(101,206,165,0.05),rgba(101,206,165,0.15),rgba(101,206,165,0.05));background-size:200% 100%;animation:sk 1.5s infinite;border-radius:6px;color:transparent;display:inline-block;min-width:60px;}
@keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <a href="store_v2_home.html" class="back-btn">←</a>
    <div class="page-title">
      <h1>予約</h1>
      <div class="sub">予約管理・キャンセル履歴</div>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi"><div class="lab">本日予約</div><div class="num" id="kpi-today"><span class="skeleton">0</span><span class="u">件</span></div><div class="d" id="kpi-today-d">--</div></div>
    <div class="kpi"><div class="lab">承認待ち</div><div class="num" id="kpi-pending"><span class="skeleton">0</span><span class="u">件</span></div><div class="d warn" id="kpi-pending-d">--</div></div>
    <div class="kpi"><div class="lab">今月予約</div><div class="num" id="kpi-month"><span class="skeleton">0</span><span class="u">件</span></div><div class="d">月累計</div></div>
    <div class="kpi"><div class="lab">今月キャンセル</div><div class="num" id="kpi-cxl"><span class="skeleton">0</span><span class="u">件</span></div><div class="d" id="kpi-cxl-d">--</div></div>
  </div>

  <!-- 日付ナビ -->
  <div class="date-bar">
    <div class="date-nav">
      <button onclick="changeDay(-1)">←</button>
      <button onclick="changeDay(0)" style="font-weight:700;">今日</button>
      <button onclick="changeDay(1)">→</button>
    </div>
    <div class="date-text" id="current-date">読込中...</div>
  </div>

  <!-- フィルタタブ -->
  <div class="tabs">
    <button class="tab on" onclick="setFilter('all',this)">すべて</button>
    <button class="tab" onclick="setFilter('pending',this)">承認待</button>
    <button class="tab" onclick="setFilter('confirmed',this)">確定</button>
    <button class="tab" onclick="setFilter('payment',this)">決済待</button>
    <button class="tab" onclick="setFilter('cancelled',this)">キャンセル</button>
  </div>

  <!-- 予約リスト -->
  <div class="panel">
    <div class="panel-title"><span id="list-title">本日の予約</span><span class="meta" id="list-count">--</span></div>
    <div id="bkg-list">
      <div class="empty">予約データを読み込み中...</div>
    </div>
  </div>

  <!-- キャンセル履歴 -->
  <div class="panel">
    <div class="panel-title"><span>今月のキャンセル履歴</span><span class="meta" id="cxl-count">--</span></div>
    <div id="cxl-list">
      <div class="empty">読み込み中...</div>
    </div>
  </div>

</div>

<script>
const SB_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}});

const STORE_KEY='tozuike';
let currentDate=getTodayString();
let currentFilter='all';
let allDayBookings=[];

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){location.replace('store_login.html');return;}
  await loadKPI();
  await loadDay();
  await loadCancellations();
})();

function getTodayString(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getMonthStartString(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}

function changeDay(offset){
  if(offset===0){
    currentDate=getTodayString();
  }else{
    const d=new Date(currentDate+'T00:00:00');
    d.setDate(d.getDate()+offset);
    currentDate=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  loadDay();
}

function formatDateLabel(ds){
  const d=new Date(ds+'T00:00:00');
  const wd=['日','月','火','水','木','金','土'][d.getDay()];
  const today=getTodayString();
  let prefix='';
  if(ds===today)prefix='今日 · ';
  return prefix+`${d.getMonth()+1}/${d.getDate()}(${wd})`;
}

async function loadKPI(){
  const today=getTodayString();
  const monthStart=getMonthStartString();
  
  /* 本日 */
  const{data:todayBkgs}=await sb.from('bookings')
    .select('id,status')
    .eq('store_key',STORE_KEY)
    .eq('booking_date',today);
  const tToday=todayBkgs||[];
  const tPending=tToday.filter(b=>['pending_approval','pending'].includes(b.status)).length;
  
  /* 今月 */
  const{data:monthBkgs}=await sb.from('bookings')
    .select('id,status')
    .eq('store_key',STORE_KEY)
    .gte('booking_date',monthStart);
  const mAll=monthBkgs||[];
  const mCxl=mAll.filter(b=>['cancelled','refunded'].includes(b.status)).length;
  const mTotal=mAll.length;
  const cxlRate=mTotal>0?Math.round(mCxl/mTotal*1000)/10:0;
  
  document.getElementById('kpi-today').innerHTML=tToday.length+'<span class="u">件</span>';
  document.getElementById('kpi-today-d').textContent=tToday.length>0?'本日分':'予約なし';
  document.getElementById('kpi-pending').innerHTML=tPending+'<span class="u">件</span>';
  document.getElementById('kpi-pending-d').textContent=tPending>0?'要対応':'対応済';
  document.getElementById('kpi-month').innerHTML=mTotal+'<span class="u">件</span>';
  document.getElementById('kpi-cxl').innerHTML=mCxl+'<span class="u">件</span>';
  document.getElementById('kpi-cxl-d').textContent='率 '+cxlRate+'%';
}

async function loadDay(){
  document.getElementById('current-date').textContent=formatDateLabel(currentDate);
  document.getElementById('list-title').textContent=formatDateLabel(currentDate)+'の予約';
  
  const{data,error}=await sb.from('bookings')
    .select('id,customer_name,coach_id,coach_name,store_key,lesson_type,minutes,booking_date,booking_time,total_price,status,comment,review_status,reviewed_at')
    .eq('store_key',STORE_KEY)
    .eq('booking_date',currentDate)
    .order('booking_time',{ascending:true});
  
  if(error){
    document.getElementById('bkg-list').innerHTML='<div class="empty">エラー: '+error.message+'</div>';
    return;
  }
  allDayBookings=data||[];
  renderBookings();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderBookings();
}

function renderBookings(){
  let filtered=allDayBookings;
  if(currentFilter==='pending'){
    filtered=filtered.filter(b=>['pending_approval','pending'].includes(b.status));
  }else if(currentFilter==='confirmed'){
    filtered=filtered.filter(b=>['confirmed','approved','completed'].includes(b.status));
  }else if(currentFilter==='payment'){
    filtered=filtered.filter(b=>b.status==='approved_pending_payment');
  }else if(currentFilter==='cancelled'){
    filtered=filtered.filter(b=>['cancelled','refunded'].includes(b.status));
  }
  
  document.getElementById('list-count').textContent=filtered.length+'件';
  
  if(filtered.length===0){
    document.getElementById('bkg-list').innerHTML='<div class="empty">該当する予約がありません</div>';
    return;
  }
  
  const lessonMap={indoor:'インドア',round:'ラウンド',accompany:'同伴',comp:'コンペ',custom:'独自プラン'};
  const html=filtered.map(b=>{
    const tStr=b.booking_time?b.booking_time.slice(0,5):'--:--';
    const lesson=lessonMap[b.lesson_type]||b.lesson_type||'';
    let pill='';
    if(b.status==='confirmed') pill='<span class="bk-pill bk-cfm">確定</span>';
    else if(b.status==='approved') pill='<span class="bk-pill bk-cfm">承認済</span>';
    else if(b.status==='completed') pill='<span class="bk-pill bk-cmp">完了</span>';
    else if(b.status==='pending_approval'||b.status==='pending') pill='<span class="bk-pill bk-pnd">承認待</span>';
    else if(b.status==='approved_pending_payment') pill='<span class="bk-pill bk-pay">決済待</span>';
    else if(b.status==='cancelled'||b.status==='refunded') pill='<span class="bk-pill bk-cxl">キャンセル</span>';
    else pill='<span class="bk-pill bk-pnd">'+escapeHtml(b.status)+'</span>';
    
    return`
      <div class="row">
        <div class="l-time">${tStr}<span class="d">${b.minutes||'--'}分</span></div>
        <div class="l-info">
          <div class="l-name">${escapeHtml(b.customer_name||'(お客様)')}</div>
          <div class="l-meta">${escapeHtml(b.coach_name||'(コーチ)')} · ${lesson}</div>
        </div>
        <div class="l-amt">¥${(b.total_price||0).toLocaleString()}</div>
        ${pill}
      </div>
    `;
  }).join('');
  document.getElementById('bkg-list').innerHTML=html;
}

async function loadCancellations(){
  const monthStart=getMonthStartString();
  const{data}=await sb.from('bookings')
    .select('id,customer_name,coach_name,lesson_type,booking_date,booking_time,total_price,status')
    .eq('store_key',STORE_KEY)
    .gte('booking_date',monthStart)
    .in('status',['cancelled','refunded'])
    .order('booking_date',{ascending:false})
    .limit(15);
  
  const cxls=data||[];
  document.getElementById('cxl-count').textContent=cxls.length+'件';
  
  if(cxls.length===0){
    document.getElementById('cxl-list').innerHTML='<div class="empty">今月のキャンセルはありません</div>';
    return;
  }
  
  const lessonMap={indoor:'インドア',round:'ラウンド',accompany:'同伴',comp:'コンペ',custom:'独自'};
  const html=cxls.map(b=>{
    const dStr=formatDateShort(b.booking_date);
    const tStr=b.booking_time?b.booking_time.slice(0,5):'';
    const lesson=lessonMap[b.lesson_type]||b.lesson_type;
    const isCxl=b.status==='cancelled';
    return`
      <div class="row">
        <div class="l-time">${dStr}<span class="d">${tStr}</span></div>
        <div class="l-info">
          <div class="l-name">${escapeHtml(b.customer_name||'(お客様)')}</div>
          <div class="l-meta">${escapeHtml(b.coach_name||'')} · ${lesson}</div>
        </div>
        <div class="l-amt">¥${(b.total_price||0).toLocaleString()}</div>
        <span class="bk-pill bk-cxl">${isCxl?'キャンセル':'返金済'}</span>
      </div>
    `;
  }).join('');
  document.getElementById('cxl-list').innerHTML=html;
}

function formatDateShort(ds){
  if(!ds)return'';
  const p=String(ds).split('-');
  if(p.length<3)return ds;
  const wd=['日','月','火','水','木','金','土'][new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).getDay()];
  return`${parseInt(p[1])}/${parseInt(p[2])}<br><span style="color:var(--muted);font-size:10px;">(${wd})</span>`;
}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
