<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach — LINE連携</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{background:#fff;border-radius:16px;padding:32px 24px;max-width:380px;width:100%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
.logo{font-size:24px;font-weight:700;color:#085041;margin-bottom:8px;}
.title{font-size:18px;font-weight:700;color:#333;margin-bottom:16px;}
.message{font-size:14px;color:#666;line-height:1.6;margin-bottom:24px;}
.spinner{width:48px;height:48px;border:4px solid #E1F5EE;border-top-color:#1D9E75;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.success{color:#1D9E75;font-size:48px;margin-bottom:16px;}
.error{color:#E24B4A;font-size:48px;margin-bottom:16px;}
.btn{display:block;width:100%;background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;text-align:center;margin-top:16px;}
.btn-line{background:#06C755;}
.hidden{display:none;}
.debug{font-size:10px;color:#999;margin-top:12px;word-break:break-all;line-height:1.4;}
</style>
</head>
<body>

<div class="container">
  <div class="logo">MyCoach</div>

  <!-- 処理中 -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="title">LINE連携中...</div>
    <div class="message">少々お待ちください</div>
  </div>

  <!-- 成功 -->
  <div id="success" class="hidden">
    <div class="success">✅</div>
    <div class="title">LINE連携が完了しました</div>
    <div class="message">予約状況や決済案内をLINEで受け取れます</div>
    <a href="#" id="next-btn" class="btn">次へ進む</a>
  </div>

  <!-- エラー -->
  <div id="error" class="hidden">
    <div class="error">⚠️</div>
    <div class="title">連携に失敗しました</div>
    <div class="message" id="error-message">時間をおいて再度お試しください</div>
    <a href="javascript:location.reload()" class="btn">再試行する</a>
    <div class="debug" id="error-debug"></div>
  </div>
</div>

<script>
const LIFF_ID = '2010206965-HfioOoUZ';

/* 【2026/5/27 修正版】LINE公式仕様準拠
 * 重要:LIFF URL `https://liff.line.me/{liffId}?type=customer&uid=xxx` でアクセスすると、
 * LIFFサーバーが `?type=customer&uid=xxx` を `liff.state` パラメータにエンコードして
 * Endpoint URL にリダイレクトする。
 * `liff.init()` 実行時に SDK が `liff.state` を展開して URL に戻す。
 * したがって URLパラメータは `liff.init()` 完了後に取得する必要がある。
 */

async function main() {
  try {
    // ステップ1:LIFF初期化を先に実行(liff.state の展開を待つ)
    await liff.init({ liffId: LIFF_ID });

    // ステップ2:外部ブラウザかつ未ログインの場合のみログイン要求
    // LIFFブラウザ内では liff.init() で自動ログイン済み
    if (!liff.isInClient() && !liff.isLoggedIn()) {
      // 重要:redirectUri を指定しない(デフォルトは Endpoint URL)
      // 指定するとパラメータが消える原因になる
      liff.login();
      return;
    }

    // ステップ3:URLパラメータを取得(この時点で liff.state は展開済み)
    const params = new URLSearchParams(window.location.search);
    let userType = params.get('type');
    let userId = params.get('uid');

    // ステップ4:バックアップとして sessionStorage も確認
    // (LINE外ブラウザでログイン経由した場合のフォールバック)
    if (userId && userType) {
      sessionStorage.setItem('liff_link_uid', userId);
      sessionStorage.setItem('liff_link_type', userType);
    } else {
      userId = sessionStorage.getItem('liff_link_uid');
      userType = sessionStorage.getItem('liff_link_type');
    }

    userType = userType || 'customer';

    if (!userId) {
      // デバッグ情報を表示
      const debugInfo = 'URL: ' + window.location.href +
        ' | search: ' + window.location.search +
        ' | type: ' + userType +
        ' | uid: ' + userId;
      throw new Error('ユーザーIDが指定されていません [DEBUG: ' + debugInfo + ']');
    }

    // ステップ5:LINE UserID取得
    const profile = await liff.getProfile();
    const lineUserId = profile.userId;
    const displayName = profile.displayName;

    // ステップ6:バックエンドに送信(DB保存)
    const response = await fetch('/.netlify/functions/liff-link-process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: userId,
        user_type: userType,
        line_user_id: lineUserId,
        display_name: displayName
      })
    });

    const result = await response.json();

    if (!response.ok || !result.success) {
      throw new Error(result.error || '連携処理に失敗しました');
    }

    // sessionStorage クリーンアップ
    sessionStorage.removeItem('liff_link_uid');
    sessionStorage.removeItem('liff_link_type');

    // 成功表示
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('success').classList.remove('hidden');

    // 次画面のリンク設定
    const nextUrl = userType === 'customer'
      ? '/onboarding_step5.html'
      : '/coach_onboarding_step7.html';
    document.getElementById('next-btn').href = nextUrl;

    // 2秒後に自動遷移
    setTimeout(() => {
      if (liff.isInClient()) {
        liff.closeWindow();
      } else {
        window.location.href = nextUrl;
      }
    }, 2000);

  } catch (e) {
    console.error('[LIFF Error]', e);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
    const msg = e.message || '時間をおいて再度お試しください';
    document.getElementById('error-message').textContent = msg.split('[DEBUG:')[0].trim() || '時間をおいて再度お試しください';
    const debugMatch = msg.match(/\[DEBUG: (.+?)\]/);
    if (debugMatch) {
      document.getElementById('error-debug').textContent = debugMatch[1];
    }
  }
}

main();
</script>

</body>
</html>
