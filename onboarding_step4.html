<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach — LINE連携</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#051E18;
  color:#fff;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(101,206,165,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 85%, rgba(201,169,97,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(6,77,59,0.6) 0%, transparent 70%);
  z-index:0;
  pointer-events:none;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
  opacity:0.06;
  z-index:0;
  pointer-events:none;
  mix-blend-mode:overlay;
}

.glow-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(60px);
  z-index:1;
  pointer-events:none;
  animation:float 8s ease-in-out infinite;
}
.glow-orb-1{
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(101,206,165,0.4),transparent 70%);
  top:-80px;right:-80px;
}
.glow-orb-2{
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(6,199,85,0.25),transparent 70%);
  bottom:-60px;left:-60px;
  animation-delay:2s;
}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1);}
  50%{transform:translate(15px,-20px) scale(1.05);}
}

.container{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 24px;
  max-width:480px;
  margin:0 auto;
}

.step-indicator{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:36px;
  opacity:0;
  animation:fadeIn 0.6s ease 0.1s forwards;
}
.step-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:all 0.3s;
}
.step-dot.done{background:#65CEA5;box-shadow:0 0 8px rgba(101,206,165,0.6);}
.step-dot.current{
  background:#C9A961;
  width:24px;
  border-radius:6px;
  box-shadow:0 0 12px rgba(201,169,97,0.7);
}
.step-text{
  font-size:11px;
  color:rgba(255,255,255,0.55);
  margin-left:8px;
  letter-spacing:0.05em;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

.logo-area{
  text-align:center;
  margin-bottom:24px;
  opacity:0;
  animation:fadeIn 0.6s ease 0.2s forwards;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;
  font-weight:600;
  letter-spacing:0.02em;
  background:linear-gradient(135deg,#fff 0%,#C9A961 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
  margin-bottom:6px;
}
.logo-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:11px;
  letter-spacing:0.3em;
  color:rgba(255,255,255,0.6);
  text-transform:uppercase;
}

.card{
  width:100%;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;
  padding:28px 22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  opacity:0;
  animation:fadeIn 0.7s ease 0.3s forwards;
}

.card-title{
  font-size:20px;
  font-weight:700;
  text-align:center;
  margin-bottom:8px;
  letter-spacing:0.02em;
  line-height:1.5;
}
.card-title .accent{color:#65CEA5;}
.card-sub{
  font-size:12px;
  color:rgba(255,255,255,0.7);
  text-align:center;
  line-height:1.7;
  margin-bottom:20px;
}

.benefits-box{
  background:rgba(101,206,165,0.06);
  border:1px solid rgba(101,206,165,0.2);
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:22px;
}
.benefits-title{
  font-size:11px;
  font-weight:700;
  color:#65CEA5;
  margin-bottom:10px;
  letter-spacing:0.05em;
}
.benefits-list{
  list-style:none;
}
.benefits-list li{
  font-size:12px;
  color:rgba(255,255,255,0.85);
  line-height:1.9;
  padding-left:18px;
  position:relative;
}
.benefits-list li::before{
  content:'✓';
  position:absolute;
  left:0;
  color:#65CEA5;
  font-weight:700;
}

.line-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:16px;
  background:#06C755;
  color:#fff;
  border-radius:12px;
  font-size:15px;
  font-weight:700;
  text-decoration:none;
  border:none;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 8px 20px rgba(6,199,85,0.4);
  transition:all 0.2s;
}
.line-btn:active{transform:scale(0.98);}
.line-btn:hover{
  background:#05b54c;
  box-shadow:0 12px 28px rgba(6,199,85,0.5);
  transform:translateY(-1px);
}
.line-btn-note{
  font-size:11px;
  color:rgba(255,255,255,0.6);
  text-align:center;
  margin-top:10px;
  line-height:1.6;
}

.skip-area{
  margin-top:20px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,0.1);
  text-align:center;
}
.skip-text{
  font-size:10px;
  color:rgba(255,255,255,0.5);
  margin-bottom:8px;
  line-height:1.5;
}
.skip-btn{
  background:none;
  border:none;
  color:rgba(255,255,255,0.55);
  font-family:inherit;
  font-size:12px;
  cursor:pointer;
  text-decoration:underline;
  padding:4px 8px;
}
.skip-btn:hover{color:rgba(255,255,255,0.85);}

.success-box{
  background:linear-gradient(135deg,rgba(101,206,165,0.2),rgba(6,199,85,0.2));
  border:1px solid #65CEA5;
  border-radius:14px;
  padding:20px;
  text-align:center;
  margin-bottom:16px;
}
.success-icon{
  font-size:48px;
  margin-bottom:8px;
}
.success-title{
  font-size:18px;
  font-weight:700;
  color:#65CEA5;
  margin-bottom:6px;
}
.success-sub{
  font-size:12px;
  color:rgba(255,255,255,0.85);
}

.error-box{
  background:rgba(226,75,74,0.15);
  border:1px solid rgba(226,75,74,0.4);
  border-radius:10px;
  padding:10px 12px;
  font-size:11px;
  color:#ffb0b0;
  margin-bottom:14px;
  line-height:1.5;
  display:none;
}
.error-box.show{display:block;}

.spinner{
  display:inline-block;
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-right:6px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

.footer-text{
  margin-top:24px;
  text-align:center;
  font-size:10px;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.05em;
  opacity:0;
  animation:fadeIn 0.6s ease 0.5s forwards;
}
</style>
</head>
<body> <button onclick="if(history.length>1){history.back();}else{location.href='customer_login.html';}" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(255,255,255,0.9);border:1px solid #ddd;border-radius:20px;padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);color:#333;">← 戻る</button>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<div class="container">

  <div class="step-indicator">
    <div class="step-dot done"></div>
    <div class="step-dot done"></div>
    <div class="step-dot done"></div>
    <div class="step-dot current"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <span class="step-text">STEP 4 / 6</span>
  </div>

  <div class="logo-area">
    <div class="logo">MyCoach</div>
    <div class="logo-sub">Golf Coaching Platform</div>
  </div>

  <div class="card">
    <!-- 連携前画面 -->
    <div id="before-linked">
      <div class="card-title">
        <span class="accent">LINE連携</span>
      </div>
      <div class="card-sub">
        公式LINEと連携すると<br>
        予約や決済のお知らせを LINE で受け取れます
      </div>

      <div class="benefits-box">
        <div class="benefits-title">📱 LINE連携でできること</div>
        <ul class="benefits-list">
          <li>予約承認通知が届く</li>
          <li>決済リンクをLINEで受け取れる</li>
          <li>レッスン前日のリマインド</li>
          <li>キャンセル通知</li>
        </ul>
      </div>

      <div class="error-box" id="error-box"></div>

      <!-- LIFF方式:タップだけで自動連携 -->
      <button id="liff-link-btn" type="button" onclick="startLiffLink()" class="line-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M12 2C6.48 2 2 6.02 2 11c0 3.07 1.6 5.78 4.07 7.5L5 21l2.86-1.5A10.07 10.07 0 0012 20c5.52 0 10-4.02 10-9S17.52 2 12 2z"/>
        </svg>
        LINEで連携する(タップだけ)
      </button>
      <div class="line-btn-note">
        LINEを開いて「許可する」を押すだけで連携完了
      </div>

      <div class="skip-area">
        <div class="skip-text">
          後でマイページから連携することもできます
        </div>
        <button class="skip-btn" onclick="skipLinkage()">
          スキップして次へ進む →
        </button>
      </div>
    </div>

    <!-- 連携完了画面 -->
    <div id="after-linked" style="display:none;">
      <div class="success-box">
        <div class="success-icon">🎉</div>
        <div class="success-title">LINE連携が完了しました!</div>
        <div class="success-sub">
          予約・決済通知を LINE で受け取れます
        </div>
      </div>
      <div style="text-align:center;color:rgba(255,255,255,0.7);font-size:12px;padding:10px;">
        <span class="spinner"></span>
        次の画面へ進みます...
      </div>
    </div>
  </div>

  <div class="footer-text">© KSK.KK — Powered by Golf Create</div>

</div>

<script>
const SUPABASE_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{
  auth:{persistSession:true,storageKey:'gc',storage:window.localStorage,autoRefreshToken:true,detectSessionInUrl:false}
});

var currentUserId=null;
var customerRowId=null;

/* 【2026/5/28 修正】セッション取得の堅牢化(step5と同方式) */
async function getSessionRobust(){
  for(var i=0;i<5;i++){
    var res=await sb.auth.getSession();
    if(res.data && res.data.session){
      return res.data.session;
    }
    await new Promise(function(r){setTimeout(r,400);});
  }
  return null;
}

/* ページ読み込み時:セッション確認 → 連携状態確認 */
window.addEventListener('DOMContentLoaded',async function(){
  var session=await getSessionRobust();
  if(!session){
    window.location.href='customer_login.html';
    return;
  }
  currentUserId=session.user.id;

  var{data,error}=await sb.from('customers').select('id,line_user_id,is_approved').eq('user_id',currentUserId).maybeSingle();
  if(error||!data){
    showError('お客様情報が取得できません。会員認証からやり直してください。');
    setTimeout(function(){window.location.href='onboarding_step3.html';},2000);
    return;
  }

  customerRowId=data.id;

  /* 既にLINE連携済みの場合 → 完了画面へ */
  if(data.line_user_id){
    showLinkedSuccess();
    return;
  }
});

function showError(msg){
  var el=document.getElementById('error-box');
  el.textContent='⚠️ '+msg;
  el.classList.add('show');
}

function hideError(){
  var el=document.getElementById('error-box');
  el.classList.remove('show');
}

function showLinkedSuccess(){
  document.getElementById('before-linked').style.display='none';
  document.getElementById('after-linked').style.display='block';
  setTimeout(function(){
    window.location.href='onboarding_step5.html';
  },1500);
}

function skipLinkage(){
  window.location.href='onboarding_step5.html';
}

/* LIFF方式による自動連携 */
function startLiffLink(){
  if(!customerRowId){
    showError('お客様情報が取得できていません。ページを再読み込みしてください。');
    return;
  }
  var liffUrl='https://liff.line.me/2010206965-HfioOoUZ?type=customer&uid='+encodeURIComponent(customerRowId);
  window.location.href=liffUrl;
}
</script>
</body>
</html>
