<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach LINE承認テスト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #f5f5f5;
    padding: 20px;
    color: #333;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 20px;
    color: #2E7D32;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }
  .section {
    margin-bottom: 24px;
    padding: 16px;
    background: #f9f9f9;
    border-radius: 8px;
  }
  .section h2 {
    font-size: 14px;
    color: #555;
    margin-bottom: 12px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 0;
    border-bottom: 1px solid #eee;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: #888; }
  .info-value { color: #222; font-weight: 500; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  button:active { opacity: 0.7; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: #2E7D32;
    color: white;
  }
  .result {
    padding: 16px;
    border-radius: 8px;
    font-size: 13px;
    word-break: break-all;
    white-space: pre-wrap;
    font-family: 'Courier New', monospace;
    max-height: 300px;
    overflow-y: auto;
  }
  .result.success {
    background: #E8F5E9;
    border: 1px solid #2E7D32;
    color: #1B5E20;
  }
  .result.error {
    background: #FFEBEE;
    border: 1px solid #C62828;
    color: #B71C1C;
  }
  .result.loading {
    background: #FFF8E1;
    border: 1px solid #F57F17;
    color: #E65100;
  }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .status-dot.green { background: #2E7D32; }
  .status-dot.red { background: #C62828; }
  .status-dot.yellow { background: #F57F17; }
</style>
</head>
<body>

<div class="container">
  <h1>🧪 MyCoach LINE承認テスト</h1>
  <p class="subtitle">バックエンドの動作確認用ページ（一時的なテスト用）</p>

  <div class="section">
    <h2>📋 テスト予約内容</h2>
    <div class="info-row">
      <span class="info-label">お客様</span>
      <span class="info-value">森下啓介</span>
    </div>
    <div class="info-row">
      <span class="info-label">コーチ</span>
      <span class="info-value">テスト太郎</span>
    </div>
    <div class="info-row">
      <span class="info-label">種別</span>
      <span class="info-value">インドアゴルフレッスン</span>
    </div>
    <div class="info-row">
      <span class="info-label">日時</span>
      <span class="info-value">2026年4月30日(木) 14:00</span>
    </div>
    <div class="info-row">
      <span class="info-label">店舗</span>
      <span class="info-value">Golf Create 戸津池店</span>
    </div>
    <div class="info-row">
      <span class="info-label">金額</span>
      <span class="info-value">¥8,000</span>
    </div>
  </div>

  <button id="btnTest" class="btn-primary">
    🧪 テスト予約を作成する（LINEに承認依頼送信）
  </button>

  <div id="result" class="result" style="display:none;"></div>
</div>

<script>
  const btn = document.getElementById('btnTest');
  const result = document.getElementById('result');

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.textContent = '⏳ 送信中...';

    result.style.display = 'block';
    result.className = 'result loading';
    result.textContent = '🔄 送信中...\n数秒お待ちください。';

    try {
      const res = await fetch('/.netlify/functions/create-booking-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customer_id: '48f47262-8ea1-43f7-b667-3267d41812ae',
          coach_id: '6f728334-3fbe-4af2-93b1-9b4d288c2ca3',
          store_key: 'kyoto',
          lesson_type: 'indoor',
          minutes: 60,
          total_price: 8000,
          booking_date: '2026-04-30',
          booking_time: '14:00',
          comment: 'テスト予約（承認フロー検証用）',
          agreed_terms: true,
          customer_name: '森下啓介',
          coach_name: 'テスト太郎'
        })
      });

      const data = await res.json();

      if (data.ok) {
        result.className = 'result success';
        result.textContent =
          '✅ 成功しました！\n\n' +
          '🔔 森下様のLINEに「🏌 新しいご予約依頼」Flex Messageが届いたはずです。\n\n' +
          '━━━━━━━━━━━━━━━\n' +
          '【APIレスポンス】\n' +
          `booking_id: ${data.booking_id}\n` +
          `status: ${data.status}\n` +
          `コーチ通知: ${data.coach_notified ? '送信済み' : '送信されず'}\n` +
          `message: ${data.message}\n` +
          '━━━━━━━━━━━━━━━\n\n' +
          '👉 次の確認:\n' +
          '1. LINEを確認してください\n' +
          '2. Flex Messageの[✅承認する]または[❌却下する]をタップ\n' +
          '3. LINE通知の動作を確認';
      } else {
        result.className = 'result error';
        result.textContent = '❌ エラー:\n\n' + JSON.stringify(data, null, 2);
      }
    } catch (err) {
      result.className = 'result error';
      result.textContent = '❌ 通信エラー:\n\n' + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '🧪 もう一度テストする';
    }
  });
</script>

</body>
</html>
