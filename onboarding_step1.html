<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach — 新規会員登録</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--green-deep:#051E18;--green-base:#064D3B;--green-mid:#0A6B52;--green-bright:#65CEA5;--gold:#C9A961;--gold-light:#E8D9A8;--white:#FFFFFF;--text-sub:rgba(255,255,255,0.78);--text-faint:rgba(255,255,255,0.5);}
html,body{font-family:'Noto Sans JP',sans-serif;min-height:100vh;color:var(--white);background:var(--green-deep);}
body{display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow-x:hidden;}
.bg-layer{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(101,206,165,0.18),transparent 60%),radial-gradient(ellipse 60% 40% at 100% 100%,rgba(201,169,97,0.1),transparent 60%),linear-gradient(180deg,#051E18 0%,#064D3B 50%,#03130E 100%);}
.bg-noise{position:fixed;inset:0;z-index:1;opacity:0.05;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
.glow-orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:1;}
.orb-1{width:280px;height:280px;background:radial-gradient(circle,rgba(101,206,165,0.4),transparent 70%);top:-80px;right:-80px;}
.orb-2{width:240px;height:240px;background:radial-gradient(circle,rgba(201,169,97,0.25),transparent 70%);bottom:-60px;left:-60px;}
.wrap{position:relative;z-index:2;width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;padding:30px 0;}
.back-link{align-self:flex-start;margin-bottom:14px;color:var(--gold);font-size:11px;letter-spacing:2px;cursor:pointer;background:none;border:none;font-family:inherit;display:flex;align-items:center;gap:6px;}
.back-link svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;}
.brand{text-align:center;margin-bottom:20px;}
.brand-mark{display:inline-flex;align-items:center;gap:10px;margin-bottom:10px;}
.brand-line{width:2px;height:24px;background:linear-gradient(180deg,var(--gold),var(--green-bright));border-radius:1px;}
.brand-text{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;letter-spacing:1px;background:linear-gradient(135deg,var(--white) 30%,var(--green-bright) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.brand-tagline{display:inline-block;font-size:8px;letter-spacing:4px;color:var(--gold);background:rgba(201,169,97,0.1);border:1px solid rgba(201,169,97,0.3);padding:3px 10px;border-radius:10px;text-transform:uppercase;}
.progress-label{text-align:center;font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:10px;text-transform:uppercase;}
.progress{display:flex;align-items:center;gap:6px;margin-bottom:24px;justify-content:center;}
.progress-dot{width:24px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);}
.progress-dot.active{background:linear-gradient(90deg,var(--gold),var(--green-bright));box-shadow:0 0 12px rgba(201,169,97,0.35);}
.glass-card{width:100%;background:rgba(255,255,255,0.04);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-radius:24px;padding:28px 22px;position:relative;}
.glass-card::before{content:'';position:absolute;inset:0;border-radius:24px;padding:1px;background:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0.05) 50%,rgba(201,169,97,0.2));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.section-title{font-size:20px;font-weight:600;color:var(--white);margin-bottom:6px;text-align:center;}
.section-title .accent{color:var(--green-bright);font-family:'Cormorant Garamond',serif;font-weight:600;}
.section-sub{font-size:11px;color:var(--text-sub);text-align:center;margin-bottom:22px;letter-spacing:0.5px;line-height:1.6;}
.field{position:relative;margin-bottom:14px;}
.field-label{font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;text-transform:uppercase;font-weight:600;}
.field-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px 14px 44px;color:var(--white);font-size:14px;font-family:inherit;outline:none;transition:all 0.3s;}
.field-input:focus{border-color:var(--green-bright);box-shadow:0 0 0 3px rgba(101,206,165,0.15);}
.field-input::placeholder{color:rgba(255,255,255,0.35);}
.field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:none;stroke:var(--gold);stroke-width:2;margin-top:11px;pointer-events:none;}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--green-bright),var(--green-mid));color:var(--white);border:none;border-radius:14px;padding:16px;font-size:14px;font-weight:700;letter-spacing:2px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 24px rgba(101,206,165,0.3),inset 0 1px 0 rgba(255,255,255,0.2);text-transform:uppercase;margin-top:8px;}
.btn-primary svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.err{color:#ff8a8a;font-size:12px;margin-bottom:12px;display:none;text-align:center;padding:10px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:10px;}
.err a{color:var(--green-bright);text-decoration:underline;font-weight:600;}
.hint-card{background:rgba(201,169,97,0.08);border:1px solid rgba(201,169,97,0.2);border-radius:12px;padding:12px;margin-top:14px;font-size:10px;color:var(--text-sub);line-height:1.7;}
.hint-card strong{color:var(--gold);font-weight:600;}
.success-msg{color:var(--green-bright);font-size:13px;margin-bottom:14px;display:none;text-align:center;padding:14px;background:rgba(101,206,165,0.1);border:1px solid rgba(101,206,165,0.3);border-radius:12px;line-height:1.7;}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-noise"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>

<div class="wrap">

  <button class="back-link" onclick="location.href='customer_login.html'">
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    ログイン画面に戻る
  </button>

  <div class="brand">
    <div class="brand-mark">
      <div class="brand-line"></div>
      <div class="brand-text">MyCoach</div>
      <div class="brand-line"></div>
    </div>
    <div class="brand-tagline">Premium Golf Coaching</div>
  </div>

  <div class="progress-label">STEP 1 OF 6</div>
  <div class="progress">
    <div class="progress-dot active"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </div>

  <div class="glass-card">
    <div class="section-title">Create <span class="accent">Account</span></div>
    <div class="section-sub">メールアドレスとパスワードを<br>ご登録ください</div>

    <div id="err" class="err"></div>
    <div id="success" class="success-msg"></div>

    <div class="field">
      <div class="field-label">Email</div>
      <svg class="field-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input class="field-input" type="email" id="email" placeholder="your@email.com">
    </div>

    <div class="field">
      <div class="field-label">Password</div>
      <svg class="field-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <input class="field-input" type="password" id="pass" placeholder="6文字以上">
    </div>

    <div class="field">
      <div class="field-label">Password Confirm</div>
      <svg class="field-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <input class="field-input" type="password" id="pass2" placeholder="もう一度入力">
    </div>

    <button class="btn-primary" id="register-btn" onclick="doRegister()">
      登録する
      <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>

    <div class="hint-card">
      <strong>📧 登録後の流れ:</strong><br>
      ご入力のメールアドレスに確認メールをお送りします。メール内のリンクをクリックして、登録を完了してください。
    </div>
  </div>

</div>

<script>
const sb=supabase.createClient('https://gojrdnufmueuvkroevut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw',{auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}});

/* Supabase Auth エラーメッセージを日本語に翻訳 */
function translateError(msg){
  if(!msg) return '登録できませんでした。もう一度お試しください';
  const m=msg.toLowerCase();
  if(m.includes('invalid format')||m.includes('invalid email')) return 'メールアドレスの形式が正しくありません';
  if(m.includes('already registered')||m.includes('already exists')) return 'このメールアドレスは既に登録されています';
  if(m.includes('password should be at least')) return 'パスワードは6文字以上で入力してください';
  if(m.includes('rate limit')) return 'しばらく時間をおいて再度お試しください';
  if(m.includes('valid password')) return 'パスワードを入力してください';
  if(m.includes('not confirmed')) return 'メール認証が完了していません。確認メールをご確認ください';
  if(m.includes('weak password')) return 'パスワードが弱すぎます。英数字を組み合わせて6文字以上で入力してください';
  if(m.includes('network')) return 'ネットワークエラーが発生しました。通信環境をご確認ください';
  return '登録できませんでした('+msg+')';
}

async function doRegister(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const pass2=document.getElementById('pass2').value;
  const err=document.getElementById('err');
  const success=document.getElementById('success');
  const btn=document.getElementById('register-btn');
  err.style.display='none';
  success.style.display='none';

  if(!email){err.textContent='メールアドレスを入力してください';err.style.display='block';return;}
  if(!pass){err.textContent='パスワードを入力してください';err.style.display='block';return;}
  if(pass.length<6){err.textContent='パスワードは6文字以上で入力してください';err.style.display='block';return;}
  if(pass!==pass2){err.textContent='パスワードが一致しません';err.style.display='block';return;}

  btn.disabled=true;
  btn.textContent='登録中...';

  const redirectUrl='https://soft-speculoos-5ef188.netlify.app/onboarding_step2.html';

  /* 【コミット10 2026-05-20】既登録ユーザーは即座にログイン誘導
     Supabase最新仕様:既登録ユーザーが signUp() を呼ぶと、
     error は返らず、data.user = null または identities=[] を返す。
     その場合は確認メール再送などせず、即座にログイン画面へ誘導する。 */
  const {data,error}=await sb.auth.signUp({
    email,
    password:pass,
    options:{
      emailRedirectTo:redirectUrl
    }
  });

  if(error){
    err.textContent=translateError(error.message);
    err.style.display='block';
    btn.disabled=false;
    btn.innerHTML='登録する <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
    return;
  }

  /* 既登録判定:
     新規登録成功時:data.user.identities = [identity1個]・identity.identity_data等あり
     既登録時:data.user は返るが、data.user.identities = [] (空配列)
     ただし「confirmation_sent_at」が data.user に直近時刻で入っていれば「新規だが未認証」
     真の既登録は「identities=[] かつ confirmation_sent_at が null/古い」 */
  const u = data?.user;
  const identitiesArr = u?.identities;
  const hasIdentities = Array.isArray(identitiesArr) && identitiesArr.length > 0;
  const justCreated = u?.created_at && (Date.now() - new Date(u.created_at).getTime()) < 60000;
  const isExistingUser = !error && u && !hasIdentities && !justCreated;

  if(isExistingUser){
    /* 既に登録済 → 即座にログイン誘導(メール再送なし) */
    err.innerHTML='このメールアドレスは既に登録されています。<br><a href="customer_login.html">ログイン画面へ進む</a>';
    err.style.display='block';
    btn.disabled=false;
    btn.innerHTML='登録する <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
    return;
  }

  /* 通常の新規登録 = メール送信済 */
  success.innerHTML='✅ 確認メールを送信しました<br>メール内のリンクをクリックして<br>登録を完了してください';
  success.style.display='block';
  btn.style.display='none';
}
</script>
</body>
</html>
