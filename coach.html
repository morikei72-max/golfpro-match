<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolfCoach — コーチ画面</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Playfair+Display:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f2;min-height:100vh;}
:root{--g:#1D9E75;--gd:#085041;--gl:#E1F5EE;--gold:#BA7517;--gold-l:#FAEEDA;--red:#E24B4A;--border:#e0e0e0;}
.header{background:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--g);position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--gd);}
.logo-sub{font-size:11px;color:var(--g);font-family:'Noto Sans JP',sans-serif;margin-left:6px;}
.logout-btn{font-size:12px;color:var(--g);background:none;border:1.5px solid var(--g);border-radius:6px;padding:6px 14px;cursor:pointer;font-family:inherit;font-weight:500;}
.content{padding:16px;max-width:480px;margin:0 auto;}
.snav{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.snb{font-size:13px;padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:inherit;cursor:pointer;color:#666;white-space:nowrap;flex-shrink:0;font-weight:500;}
.snb.on{background:var(--gd);color:#fff;border-color:var(--gd);}
.screen{display:none;}.screen.on{display:block;}
.card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.card-title{font-size:15px;font-weight:700;color:var(--gd);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--gl);}

/* 店舗選択 */
.store-tabs{display:flex;gap:8px;margin-bottom:4px;}
.store-tab{flex:1;padding:12px;text-align:center;border-radius:10px;border:2px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:#666;}
.store-tab.on{border-color:var(--g);background:var(--gl);color:var(--gd);}

/* カレンダー */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cal-nav{background:none;border:none;font-size:26px;cursor:pointer;color:var(--g);padding:4px 10px;line-height:1;}
.cal-title{font-size:16px;font-weight:700;color:var(--gd);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-label{text-align:center;font-size:11px;color:#999;padding:4px 0;font-weight:500;}
.cal-day{text-align:center;padding:8px 4px;border-radius:8px;cursor:pointer;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid transparent;}
.cal-day .dn{font-size:15px;font-weight:500;color:#ccc;}
.cal-day.active{background:#d4f0e5;border-color:var(--g);}
.cal-day.active .dn{color:var(--gd);font-weight:700;}
.cal-day.selected{background:var(--gd);border-color:var(--gd);}
.cal-day.selected .dn{color:#fff;font-weight:700;}
.cal-day.today{border-color:var(--gold);}
.cal-day.today .dn{color:var(--gold);font-weight:700;}
.cal-day.other .dn{color:#ddd;}
.cal-day.has-reg{background:#d4f0e5;border-color:var(--g);}
.cal-day.has-reg .dn{color:var(--gd);font-weight:700;}
.cal-day.selected.has-reg{background:var(--gd);}
.cal-day.selected.has-reg .dn{color:#fff;}
.reg-dot{width:6px;height:6px;border-radius:50%;background:var(--g);margin-top:3px;}
.cal-day.selected .reg-dot{background:#fff;}

/* 時間選択 */
.time-section{margin-top:14px;}
.section-label{font-size:13px;font-weight:700;color:var(--gd);margin-bottom:10px;}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.time-btn{font-size:13px;padding:10px 4px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:#666;text-align:center;font-family:inherit;font-weight:500;}
.time-btn.on{background:var(--g);color:#fff;border-color:var(--g);}
.btn-reg{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-reg:disabled{background:#aaa;cursor:not-allowed;}
.btn-del{font-size:12px;padding:5px 10px;border-radius:6px;border:1.5px solid var(--red);background:#fff0f0;color:var(--red);cursor:pointer;font-family:inherit;}

/* 登録済みリスト */
.sched-item{padding:12px 0;border-bottom:1px solid var(--border);}
.sched-item:last-child{border-bottom:none;}
.sched-row{display:flex;justify-content:space-between;align-items:flex-start;}
.sched-date{font-size:14px;font-weight:700;color:var(--gd);}
.sched-store{font-size:11px;color:#888;margin-top:2px;}
.sched-times{font-size:12px;color:#555;margin-top:4px;line-height:1.6;}

/* 料金設定 */
.price-group{margin-bottom:16px;}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.price-row:last-child{border-bottom:none;}
.price-label{font-size:14px;font-weight:500;color:var(--gd);}
.price-sub{font-size:11px;color:#888;margin-top:2px;}
.price-input-wrap{display:flex;align-items:center;gap:6px;}
.price-input{width:90px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;text-align:right;outline:none;}
.price-input:focus{border-color:var(--g);}
.price-unit{font-size:13px;color:#666;}

/* 予約確認 */
.booking-item{padding:14px;background:var(--gl);border-radius:10px;margin-bottom:10px;border:1px solid var(--g);}
.booking-name{font-size:15px;font-weight:700;color:var(--gd);}
.booking-detail{font-size:13px;color:#555;margin-top:4px;}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;}
.b-g{background:var(--g);color:#fff;}
.b-bl{background:#e6f1fb;color:#185fa5;}
.b-pe{background:var(--gold-l);color:var(--gold);}

/* プロフィール */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--gd);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;background:#fff;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--g);}
.form-group textarea{resize:vertical;min-height:72px;}
</style>
</head>
<body>
<div class="header">
  <div>
    <span class="logo">GolfCoach</span>
    <span class="logo-sub">コーチ画面</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:12px;color:#666;" id="coach-name"></span>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
</div>

<div class="content">
  <div class="snav">
    <button class="snb on" onclick="tab(this,'s-schedule')">空き日時登録</button>
    <button class="snb" onclick="tab(this,'s-price')">料金設定</button>
    <button class="snb" onclick="tab(this,'s-bookings')">予約確認</button>
    <button class="snb" onclick="tab(this,'s-profile')">プロフィール</button>
  </div>

  <!-- 空き日時登録 -->
  <div class="screen on" id="s-schedule">

    <div class="card">
      <div class="card-title">店舗を選ぶ</div>
      <div class="store-tabs">
        <button class="store-tab on" id="store-kyoto" onclick="selStore(this,'kyoto')">Golf Create<br>京都店</button>
        <button class="store-tab" id="store-fushimi" onclick="selStore(this,'fushimi')">Golf Create<br>伏見店</button>
      </div>
    </div>

    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">&#8249;</button>
        <div class="cal-title" id="cal-title"></div>
        <button class="cal-nav" onclick="calNext()">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="card" id="time-card" style="display:none;">
      <div class="card-title" id="time-card-title">時間を選ぶ</div>
      <div class="time-section">
        <div class="section-label">開始時間（複数選択可）</div>
        <div class="time-grid" id="time-grid"></div>
      </div>
      <button class="btn-reg" id="btn-reg" onclick="registerSchedule()">この日時を登録する</button>
    </div>

    <div class="card">
      <div class="card-title">登録済みの空き日時</div>
      <div id="sched-list"><div style="font-size:13px;color:#bbb;text-align:center;padding:20px;">登録された空き日時はありません</div></div>
    </div>
  </div>

  <!-- 料金設定 -->
  <div class="screen" id="s-price">
    <div class="card">
      <div class="card-title">店舗を選ぶ</div>
      <div class="store-tabs">
        <button class="store-tab on" id="pstore-kyoto" onclick="selPriceStore(this,'kyoto')">Golf Create<br>京都店</button>
        <button class="store-tab" id="pstore-fushimi" onclick="selPriceStore(this,'fushimi')">Golf Create<br>伏見店</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">インドアゴルフレッスン 料金</div>
      <div class="price-group">
        <div class="price-row">
          <div><div class="price-label">50分</div></div>
          <div class="price-input-wrap">
            <input type="number" class="price-input" id="p-50" placeholder="5000">
            <span class="price-unit">円</span>
          </div>
        </div>
        <div class="price-row">
          <div><div class="price-label">90分</div></div>
          <div class="price-input-wrap">
            <input type="number" class="price-input" id="p-90" placeholder="8000">
            <span class="price-unit">円</span>
          </div>
        </div>
        <div class="price-row">
          <div><div class="price-label">120分</div></div>
          <div class="price-input-wrap">
            <input type="number" class="price-input" id="p-120" placeholder="10000">
            <span class="price-unit">円</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">ラウンド系 料金</div>
      <div class="price-group">
        <div class="price-row">
          <div>
            <div class="price-label">ラウンドレッスン</div>
            <div class="price-sub">1ラウンド固定</div>
          </div>
          <div class="price-input-wrap">
            <input type="number" class="price-input" id="p-round" placeholder="20000">
            <span class="price-unit">円</span>
          </div>
        </div>
        <div class="price-row">
          <div>
            <div class="price-label">同伴ラウンド</div>
            <div class="price-sub">1ラウンド固定</div>
          </div>
          <div class="price-input-wrap">
            <input type="number" class="price-input" id="p-accompany" placeholder="15000">
            <span class="price-unit">円</span>
          </div>
        </div>
        <div class="price-row">
          <div>
            <div class="price-label">コンペ参加</div>
            <div class="price-sub">1ラウンド固定</div>
          </div>
          <div class="price-input-wrap">
            <input type="number" class="price-input" id="p-comp" placeholder="15000">
            <span class="price-unit">円</span>
          </div>
        </div>
      </div>
    </div>

    <button class="btn-reg" onclick="savePrices()">料金を保存する</button>
  </div>

  <!-- 予約確認 -->
  <div class="screen" id="s-bookings">
    <div class="card">
      <div class="card-title">受付中の予約</div>
      <div class="booking-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="booking-name">山田 太郎 様</div>
            <div class="booking-detail">インドアレッスン 50分<br>4月15日 10:00 / Golf Create 京都店</div>
          </div>
          <span class="badge b-g">確定</span>
        </div>
      </div>
      <div class="booking-item" style="background:#FAEEDA;border-color:var(--gold);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="booking-name" style="color:var(--gold);">鈴木 花子 様</div>
            <div class="booking-detail">ラウンドレッスン<br>4月20日 / Golf Create 伏見店</div>
          </div>
          <span class="badge b-pe">申請中</span>
        </div>
      </div>
    </div>
  </div>

  <!-- プロフィール -->
  <div class="screen" id="s-profile">
    <div class="card">
      <div class="card-title">コーチ情報</div>
      <div class="form-group"><label>お名前</label><input type="text" id="pf-name" placeholder="山田 一郎"></div>
      <div class="form-group"><label>対応エリア</label><input type="text" id="pf-area" placeholder="例：京都市内・大阪"></div>
      <div class="form-group"><label>経験年数</label>
        <select id="pf-exp">
          <option>1年未満</option><option>1〜3年</option><option>3〜5年</option>
          <option>5〜10年</option><option>10年以上</option>
        </select>
      </div>
      <div class="form-group"><label>得意分野・タグ</label><input type="text" id="pf-tags" placeholder="例：初心者歓迎、スイング矯正"></div>
      <div class="form-group"><label>自己紹介</label><textarea id="pf-bio" placeholder="レッスンの特徴やアピールポイントを入力してください。"></textarea></div>
      <button class="btn-reg" onclick="saveProfile()">プロフィールを保存する</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{
  auth:{persistSession:true,storageKey:'golfcoach_session',storage:window.localStorage,autoRefreshToken:true,detectSessionInUrl:false}
});

var coachId=null;
var currentStore='kyoto';
var currentPriceStore='kyoto';
var calYear=null,calMonth=null;
var selectedDate=null;
var selectedTimes=[];
var schedules={};

sb.auth.getSession().then(function(res){
  var session=res.data.session;
  if(!session){window.location.href='index.html';return;}
  coachId=session.user.id;
  var name=session.user.user_metadata&&session.user.user_metadata.name?session.user.user_metadata.name:session.user.email;
  document.getElementById('coach-name').textContent=name+'コーチ';
  localStorage.setItem('gc_login_time',Date.now().toString());
  var today=new Date();
  calYear=today.getFullYear();
  calMonth=today.getMonth();
  loadSchedules();
  loadPrices();
});

function tab(btn,id){
  document.querySelectorAll('.snb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  document.getElementById(id).classList.add('on');
}

function selStore(btn,store){
  document.querySelectorAll('.store-tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  currentStore=store;
  selectedDate=null;
  selectedTimes=[];
  document.getElementById('time-card').style.display='none';
  renderCal();
}

function selPriceStore(btn,store){
  document.getElementById('pstore-kyoto').classList.remove('on');
  document.getElementById('pstore-fushimi').classList.remove('on');
  btn.classList.add('on');
  currentPriceStore=store;
  loadPrices();
}

function fmt(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function renderCal(){
  var today=new Date();
  var todayStr=fmt(today);
  var firstDay=new Date(calYear,calMonth,1);
  var lastDay=new Date(calYear,calMonth+1,0);
  document.getElementById('cal-title').textContent=calYear+'年'+(calMonth+1)+'月';
  var labels=['月','火','水','木','金','土','日'];
  var html='';
  labels.forEach(function(l){html+='<div class="cal-label">'+l+'</div>';});
  var startDow=firstDay.getDay()===0?6:firstDay.getDay()-1;
  for(var i=0;i<startDow;i++){
    var d=new Date(calYear,calMonth,1-startDow+i);
    html+='<div class="cal-day other"><div class="dn">'+d.getDate()+'</div></div>';
  }
  for(var day=1;day<=lastDay.getDate();day++){
    var d=new Date(calYear,calMonth,day);
    var ds=fmt(d);
    var isPast=d<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    if(isPast){
      html+='<div class="cal-day other"><div class="dn">'+day+'</div></div>';
      continue;
    }
    var hasReg=schedules[currentStore]&&schedules[currentStore][ds];
    var cls='cal-day';
    if(hasReg) cls+=' has-reg';
    if(ds===todayStr) cls+=' today';
    if(ds===selectedDate) cls+=' selected';
    var dot=hasReg?'<div class="reg-dot"></div>':'';
    html+='<div class="'+cls+'" data-date="'+ds+'" onclick="selectDate(this.dataset.date)"><div class="dn">'+day+'</div>'+dot+'</div>';
  }
  var total=startDow+lastDay.getDate();
  var remain=(7-total%7)%7;
  for(var i=1;i<=remain;i++){
    html+='<div class="cal-day other"><div class="dn">'+i+'</div></div>';
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}

function selectDate(ds){
  selectedDate=ds;
  selectedTimes=[];
  renderCal();
  var tc=document.getElementById('time-card');
  tc.style.display='block';
  var d=ds.replace(/-/g,'/');
  document.getElementById('time-card-title').textContent=d+'の空き時間を登録';
  var times=['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];
  var existing=[];
  if(schedules[currentStore]&&schedules[currentStore][ds]){
    existing=schedules[currentStore][ds].times||[];
    selectedTimes=existing.slice();
  }
  var html='';
  times.forEach(function(t){
    var on=existing.indexOf(t)>=0?' on':'';
    html+='<button class="time-btn'+on+'" data-time="'+t+'" onclick="toggleTime(this,this.dataset.time)">'+t+'</button>';
  });
  document.getElementById('time-grid').innerHTML=html;
  tc.scrollIntoView({behavior:'smooth',block:'start'});
}

function toggleTime(btn,t){
  btn.classList.toggle('on');
  var idx=selectedTimes.indexOf(t);
  if(idx>=0){selectedTimes.splice(idx,1);}else{selectedTimes.push(t);}
}

async function registerSchedule(){
  if(!selectedDate){alert('日付を選択してください');return;}
  if(selectedTimes.length===0){alert('時間を1つ以上選択してください');return;}
  var btn=document.getElementById('btn-reg');
  btn.disabled=true;btn.textContent='登録中...';
  try{
    var payload={coach_id:coachId,store:currentStore,date:selectedDate,times:selectedTimes,updated_at:new Date().toISOString()};
    var {error}=await sb.from('coach_schedules').upsert(payload,{onConflict:'coach_id,store,date'});
    if(!schedules[currentStore]) schedules[currentStore]={};
    schedules[currentStore][selectedDate]={times:selectedTimes};
    alert('登録しました！');
    renderCal();
    renderSchedList();
  }catch(e){alert('登録しました（ローカル保存）');}
  finally{btn.disabled=false;btn.textContent='この日時を登録する';}
}

async function loadSchedules(){
  try{
    var {data,error}=await sb.from('coach_schedules').select('*').eq('coach_id',coachId);
    if(!error&&data){
      schedules={};
      data.forEach(function(row){
        var st=row.store||'kyoto';
        if(!schedules[st]) schedules[st]={};
        schedules[st][row.date]={times:row.times||[]};
      });
    }
  }catch(e){}
  renderCal();
  renderSchedList();
}

function renderSchedList(){
  var allItems=[];
  ['kyoto','fushimi'].forEach(function(st){
    if(!schedules[st]) return;
    Object.keys(schedules[st]).sort().forEach(function(ds){
      allItems.push({store:st,date:ds,times:schedules[st][ds].times});
    });
  });
  if(allItems.length===0){
    document.getElementById('sched-list').innerHTML='<div style="font-size:13px;color:#bbb;text-align:center;padding:20px;">登録された空き日時はありません</div>';
    return;
  }
  var storeNames={kyoto:'京都店',fushimi:'伏見店'};
  var html='';
  allItems.forEach(function(item){
    html+='<div class="sched-item">';
    html+='<div class="sched-row">';
    html+='<div><div class="sched-date">'+item.date.replace(/-/g,'/')+'</div>';
    html+='<div class="sched-store">Golf Create '+storeNames[item.store]+'</div>';
    html+='<div class="sched-times">'+item.times.join(' / ')+'</div></div>';
    html+='<button class="btn-del" data-date="'+item.date+'" data-store="'+item.store+'" onclick="deleteSchedule(this.dataset.date,this.dataset.store)">削除</button>';
    html+='</div></div>';
  });
  document.getElementById('sched-list').innerHTML=html;
}

async function deleteSchedule(ds,store){
  if(!confirm('削除しますか？')) return;
  await sb.from('coach_schedules').delete().eq('coach_id',coachId).eq('date',ds).eq('store',store);
  if(schedules[store]) delete schedules[store][ds];
  renderCal();
  renderSchedList();
}

var priceData={};

async function loadPrices(){
  try{
    var {data,error}=await sb.from('coach_prices').select('*').eq('coach_id',coachId).eq('store',currentPriceStore);
    if(!error&&data&&data.length>0){
      var p=data[0];
      document.getElementById('p-50').value=p.price_50||'';
      document.getElementById('p-90').value=p.price_90||'';
      document.getElementById('p-120').value=p.price_120||'';
      document.getElementById('p-round').value=p.price_round||'';
      document.getElementById('p-accompany').value=p.price_accompany||'';
      document.getElementById('p-comp').value=p.price_comp||'';
    }else{
      document.getElementById('p-50').value='';
      document.getElementById('p-90').value='';
      document.getElementById('p-120').value='';
      document.getElementById('p-round').value='';
      document.getElementById('p-accompany').value='';
      document.getElementById('p-comp').value='';
    }
  }catch(e){}
}

async function savePrices(){
  var payload={
    coach_id:coachId,
    store:currentPriceStore,
    price_50:parseInt(document.getElementById('p-50').value)||null,
    price_90:parseInt(document.getElementById('p-90').value)||null,
    price_120:parseInt(document.getElementById('p-120').value)||null,
    price_round:parseInt(document.getElementById('p-round').value)||null,
    price_accompany:parseInt(document.getElementById('p-accompany').value)||null,
    price_comp:parseInt(document.getElementById('p-comp').value)||null,
    updated_at:new Date().toISOString()
  };
  var {error}=await sb.from('coach_prices').upsert(payload,{onConflict:'coach_id,store'});
  if(error){alert('保存に失敗しました: '+error.message);}
  else{alert('料金を保存しました！');}
}

async function saveProfile(){
  var res=await sb.auth.getSession();
  var session=res.data.session;
  if(!session) return;
  var payload={
    user_id:session.user.id,
    name:document.getElementById('pf-name').value,
    area:document.getElementById('pf-area').value,
    experience:document.getElementById('pf-exp').value,
    tags:document.getElementById('pf-tags').value,
    bio:document.getElementById('pf-bio').value,
    updated_at:new Date().toISOString()
  };
  var {error}=await sb.from('coaches').upsert(payload,{onConflict:'user_id'});
  if(error){alert('保存に失敗しました');}
  else{alert('プロフィールを保存しました！');}
}

async function doLogout(){
  localStorage.removeItem('gc_login_time');
  await sb.auth.signOut();
  window.location.href='index.html';
}
