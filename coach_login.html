<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MyCoach">
<title>MyCoach — コーチログイン</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#1a1200;}
.logo{font-family:Montserrat,sans-serif;font-size:30px;font-weight:900;color:#fff;text-align:center;margin-bottom:4px;}
.logo span{color:#BA7517;}
.role{font-size:11px;letter-spacing:4px;color:#BA7517;text-align:center;margin-bottom:32px;}
.card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:24px;width:100%;max-width:360px;}
input{width:100%;padding:13px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;}
input::placeholder{color:rgba(255,255,255,0.3);}
.btn-login{width:100%;padding:14px;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;background:#BA7517;}
.btn-register{width:100%;max-width:360px;padding:14px;border:1.5px solid rgba(255,255,255,0.25);border-radius:10px;background:transparent;color:#BA7517;font-size:14px;font-weight:700;cursor:pointer;margin-top:22px;font-family:inherit;}
.err{color:#ff6b6b;font-size:12px;margin-bottom:8px;display:none;text-align:center;}
</style>
</head>
<body>
<div class="logo">My<span>Coach</span></div>
<div class="role">COACH LOGIN</div>
<div class="card">
  <div id="err" class="err"></div>
  <input type="email" id="email" placeholder="メールアドレス">
  <input type="password" id="pass" placeholder="パスワード">
  <button class="btn-login" onclick="doLogin()">ログイン</button>
</div>
<button class="btn-register" onclick="goRegister()">新規登録はこちら</button>
<script>
const sb=supabase.createClient('https://gojrdnufmueuvkroevut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw',{auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}});

/* 認証済みなら適切な画面へ振り分け */
async function routeAfterAuth(session){
  if(!session) return;
  const {data:coach}=await sb.from('coaches').select('id,name,line_user_id,bio,photo_url,store_key,is_approved,status').eq('user_id',session.user.id).maybeSingle();

  /* coachレコードが存在しない場合 → onboarding step1 から */
  if(!coach){
    location.replace('coach_onboarding_step1.html');
    return;
  }

  /* Step1未完了:基本情報がない */
  if(!coach.name){
    location.replace('coach_onboarding_step1.html');
    return;
  }

  /* Step4未完了:プロフィールがない(写真・自己紹介・所属店舗)*/
  if(!coach.photo_url || !coach.bio || !coach.store_key){
    location.replace('coach_onboarding_step4.html');
    return;
  }

  /* Step6未完了:LINE未連携 */
  if(!coach.line_user_id){
    location.replace('coach_onboarding_step6.html');
    return;
  }

  /* すべて完了 → コーチホーム画面へ */
  location.replace('coach.html');
}

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  await routeAfterAuth(session);
})();

async function doLogin(){
  const email=document.getElementById('email').value.trim().toLowerCase();
  const pass=document.getElementById('pass').value;
  const err=document.getElementById('err');
  err.style.display='none';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='メールアドレスまたはパスワードが正しくありません';err.style.display='block';return;}
  const {data:{session:newSession}}=await sb.auth.getSession();
  await routeAfterAuth(newSession);
}
function goRegister(){
  location.href='coach_register.html';
}
</script>
</body>
</html>
