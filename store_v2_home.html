<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MyCoach 本部 - ホーム</title>
<link rel="apple-touch-icon" href="mycoach_icon_180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MyCoach本部">
<meta name="theme-color" content="#000000">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:#000;color:#fff;min-height:100vh;overflow-x:hidden;}

/* 背景演出 */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 0%,rgba(101,206,165,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 400px 300px at 80% 100%,rgba(101,206,165,0.10) 0%,transparent 60%);
}

.wrap{position:relative;z-index:1;padding:20px 18px 40px;max-width:480px;margin:0 auto;}

/* ステータスバー(時刻・店舗) */
.statusbar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#fff;padding:8px 6px 12px;}
.statusbar .right{display:flex;gap:12px;align-items:center;}
.statusbar .logout{color:#7a9a8a;font-size:11px;cursor:pointer;border:1px solid rgba(101,206,165,0.2);padding:3px 10px;border-radius:100px;}
.statusbar .logout:active{background:rgba(101,206,165,0.1);}

/* ヘッダー */
.brand{font-size:32px;font-weight:900;letter-spacing:-0.02em;color:#fff;line-height:1;margin-top:8px;}
.brand span{color:#65CEA5;}
.live{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#65CEA5;font-weight:700;letter-spacing:0.08em;margin-top:6px;}
.live::before{content:'';width:8px;height:8px;background:#65CEA5;border-radius:50%;animation:p 1.5s infinite;box-shadow:0 0 12px #65CEA5;}
@keyframes p{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* ティッカー */
.ticker{background:rgba(101,206,165,0.05);border:1px solid rgba(101,206,165,0.25);border-radius:100px;padding:10px 18px;display:flex;gap:18px;font-size:11px;color:#a8f0d0;font-weight:600;overflow-x:auto;white-space:nowrap;margin-top:16px;box-shadow:0 0 24px rgba(101,206,165,0.1);}
.ticker::-webkit-scrollbar{display:none;}
.ticker strong{color:#65CEA5;text-shadow:0 0 8px rgba(101,206,165,0.5);}

/* ヒーロー(本日売上) */
.hero{margin-top:18px;background:rgba(255,255,255,0.02);border:1px solid rgba(101,206,165,0.25);border-radius:22px;padding:22px;backdrop-filter:blur(10px);box-shadow:0 0 30px rgba(101,206,165,0.1),inset 0 0 30px rgba(101,206,165,0.05);position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(101,206,165,0.18),transparent 70%);}
.hero-lab{font-size:11px;color:#65CEA5;letter-spacing:0.2em;font-weight:700;}
.hero-num{font-size:48px;font-weight:900;color:#fff;line-height:1;margin-top:8px;text-shadow:0 0 30px rgba(101,206,165,0.5);letter-spacing:-0.02em;position:relative;}
.hero-num .y{color:#65CEA5;font-weight:400;font-size:26px;vertical-align:top;margin-right:2px;}
.hero-sub{font-size:12px;color:#a8f0d0;margin-top:10px;font-weight:600;position:relative;}
.hero-sub strong{color:#65CEA5;}

/* アイコングリッド(6個・2列3行) */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:30px 4px 0;}
.app{display:flex;flex-direction:row;align-items:center;gap:14px;cursor:pointer;background:rgba(255,255,255,0.025);border:1px solid rgba(101,206,165,0.15);border-radius:18px;padding:16px 14px;transition:all .25s;position:relative;text-decoration:none;color:#fff;}
.app:active{transform:scale(0.96);}
.app:hover{border-color:rgba(101,206,165,0.5);background:rgba(101,206,165,0.06);box-shadow:0 0 24px rgba(101,206,165,0.15);}
.app .icon-wrap{width:54px;height:54px;background:rgba(101,206,165,0.06);border:1.5px solid rgba(101,206,165,0.3);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 12px rgba(101,206,165,0.15),inset 0 0 12px rgba(101,206,165,0.04);}
.app .icon-wrap svg{width:28px;height:28px;stroke:#65CEA5;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 6px rgba(101,206,165,0.6));}
.app .meta{flex:1;min-width:0;}
.app .lbl{font-size:14px;font-weight:700;color:#fff;letter-spacing:0.02em;}
.app .val{font-size:11px;color:#7a9a8a;margin-top:3px;}
.app .val strong{color:#65CEA5;font-weight:700;}
.badge{position:absolute;top:10px;right:12px;background:#ff5252;color:#fff;font-size:10px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;box-shadow:0 0 10px rgba(255,82,82,0.6);}

/* フッター */
.footer{margin-top:30px;padding-top:18px;border-top:1px solid rgba(101,206,165,0.1);text-align:center;font-size:10px;color:#5a7a6a;letter-spacing:0.15em;}

/* ローディング */
.skeleton{background:linear-gradient(90deg,rgba(101,206,165,0.05),rgba(101,206,165,0.15),rgba(101,206,165,0.05));background-size:200% 100%;animation:sk 1.5s infinite;border-radius:6px;color:transparent;display:inline-block;min-width:60px;}
@keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* タップ可能エリア最適化(モバイル) */
@media(max-width:600px){
  .hero-num{font-size:40px;}
  .hero-num .y{font-size:22px;}
  .app{padding:14px 12px;gap:12px;}
  .app .icon-wrap{width:50px;height:50px;}
  .app .icon-wrap svg{width:26px;height:26px;}
  .app .lbl{font-size:13px;}
  .app .val{font-size:10px;}
}
</style>
</head>
<body>

<div class="wrap">

  <div class="statusbar">
    <span id="cur-time">--:--</span>
    <div class="right">
      <span id="cur-store">戸津池店</span>
      <span class="logout" onclick="doLogout()">ログアウト</span>
    </div>
  </div>

  <div class="brand">My<span>Coach</span></div>
  <div class="live" id="live-status">稼働中 · <span id="store-label">戸津池店</span></div>

  <div class="ticker" id="ticker">
    <span>売上 <strong id="t-sales">¥--</strong></span>
    <span>本部 <strong id="t-hq">¥--</strong></span>
    <span>予約 <strong id="t-bkg">--</strong></span>
    <span>コーチ <strong id="t-cch">--</strong></span>
    <span>会員 <strong id="t-mbr">--</strong></span>
    <span>打席 <strong id="t-occ">--</strong></span>
  </div>

  <div class="hero">
    <div class="hero-lab">本日売上</div>
    <div class="hero-num"><span class="y">¥</span><span id="h-num"><span class="skeleton">000,000</span></span></div>
    <div class="hero-sub" id="h-sub"><span class="skeleton">前日比読込中...</span></div>
  </div>

  <div class="grid">

    <a href="store_v2_sales.html" class="app">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
      </div>
      <div class="meta">
        <div class="lbl">売上</div>
        <div class="val">月累計 <strong id="a-month">¥412k</strong></div>
      </div>
    </a>

    <a href="store_bookings.html" class="app">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="meta">
        <div class="lbl">予約</div>
        <div class="val">本日 <strong id="a-bkg">--</strong> 件</div>
      </div>
      <span class="badge" id="a-bkg-badge" style="display:none;">3</span>
    </a>

    <a href="store_coaches.html" class="app">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v2"/></svg>
      </div>
      <div class="meta">
        <div class="lbl">コーチ</div>
        <div class="val">稼働 <strong id="a-cch">--</strong> 名</div>
      </div>
      <span class="badge" id="a-cch-badge" style="display:none;">2</span>
    </a>

    <a href="store_members.html" class="app">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="meta">
        <div class="lbl">会員</div>
        <div class="val"><strong id="a-mbr">--</strong> 名</div>
      </div>
    </a>

    <a href="store_seats.html" class="app">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M3 12h2M19 12h2M12 3v2M12 19v2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/></svg>
      </div>
      <div class="meta">
        <div class="lbl">打席</div>
        <div class="val">稼働 <strong id="a-occ">--</strong></div>
      </div>
    </a>

    <a href="store_settings.html" class="app">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
      <div class="meta">
        <div class="lbl">設定</div>
        <div class="val">店舗・営業時間・分配率</div>
      </div>
    </a>

  </div>

  <div class="footer">MyCoach · 株式会社ケイエスケー · v2.0</div>

</div>

<script>
/* ============================
   Supabase 初期化
============================ */
const SB_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}});

const STORE_KEY='tozuike';
const STORE_NAME='Golf Create 戸津池店';

/* ============================
   認証チェック
============================ */
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.replace('store_login.html');return;}
  document.getElementById('store-label').textContent='戸津池店';
  document.getElementById('cur-store').textContent='戸津池店';
  loadDashboard();
})();

/* ============================
   ログアウト
============================ */
async function doLogout(){
  if(!confirm('ログアウトしますか?'))return;
  await sb.auth.signOut();
  location.replace('store_login.html');
}

/* ============================
   時計
============================ */
function updateClock(){
  const d=new Date();
  const h=String(d.getHours()).padStart(2,'0');
  const m=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('cur-time').textContent=`${h}:${m}`;
}
updateClock();setInterval(updateClock,30000);

/* ============================
   ダッシュボード読込
============================ */
async function loadDashboard(){
  try{
    const today=getJSTDateString();
    const yest=getJSTDateString(-1);
    const monthStart=getMonthStartString();

    /* 本日の予約(売上計算用) */
    const {data:todayBkg}=await sb.from('bookings')
      .select('total_price,status,coach_id,booking_time')
      .eq('store_key',STORE_KEY)
      .eq('booking_date',today)
      .in('status',['confirmed','approved_pending_payment','pending_approval','pending','approved']);
    const validToday=(todayBkg||[]).filter(b=>['confirmed','approved'].includes(b.status));
    const todaySales=validToday.reduce((s,b)=>s+(parseInt(b.total_price)||0),0);

    /* 昨日の売上(前日比) */
    const {data:yestBkg}=await sb.from('bookings')
      .select('total_price,status')
      .eq('store_key',STORE_KEY)
      .eq('booking_date',yest)
      .in('status',['confirmed','approved']);
    const yestSales=(yestBkg||[]).reduce((s,b)=>s+(parseInt(b.total_price)||0),0);
    const deltaPct=yestSales>0?((todaySales-yestSales)/yestSales*100).toFixed(1):0;

    /* 月間売上累計 */
    const {data:monthBkg}=await sb.from('bookings')
      .select('total_price,status')
      .eq('store_key',STORE_KEY)
      .gte('booking_date',monthStart)
      .in('status',['confirmed','approved']);
    const monthSales=(monthBkg||[]).reduce((s,b)=>s+(parseInt(b.total_price)||0),0);

    /* 本部取り分(16.4%)*/
    const hqShare=Math.round(todaySales*0.164);

    /* 予約件数(本日)*/
    const todayCount=(todayBkg||[]).length;
    const pendingCount=(todayBkg||[]).filter(b=>['pending_approval','pending'].includes(b.status)).length;

    /* コーチ */
    const {data:coaches}=await sb.from('coaches')
      .select('id,is_approved')
      .eq('store_key',STORE_KEY);
    const activeCoach=(coaches||[]).filter(c=>c.is_approved).length;
    const pendingCoach=(coaches||[]).filter(c=>!c.is_approved).length;

    /* 会員 */
    const {count:memberCount}=await sb.from('members')
      .select('*',{count:'exact',head:true})
      .eq('store_key',STORE_KEY)
      .eq('is_active',true);

    /* 打席(localStorage)*/
    const seats=JSON.parse(localStorage.getItem('gc_seats_'+STORE_KEY)||'[]');
    const totalSeats=seats.length||4;
    /* 簡易: 本日の稼働中予約数で稼働率推定(現時刻にかぶる予約数 / 全打席)*/
    const nowH=new Date().getHours();
    const busy=(validToday||[]).filter(b=>{
      const t=b.booking_time?parseInt(b.booking_time.split(':')[0]):-1;
      return t===nowH;
    }).length;
    const occRate=totalSeats>0?Math.round(busy/totalSeats*100):0;

    /* 表示更新 */
    document.getElementById('h-num').textContent=todaySales.toLocaleString();
    const deltaSign=deltaPct>=0?'▲':'▼';
    const deltaTxt=yestSales===0&&todaySales===0?'前日比 ±0%':`${deltaSign} ${Math.abs(deltaPct)}% · 本部取分 <strong>¥${hqShare.toLocaleString()}</strong>`;
    document.getElementById('h-sub').innerHTML=deltaTxt;

    /* ティッカー */
    document.getElementById('t-sales').textContent='¥'+todaySales.toLocaleString();
    document.getElementById('t-hq').textContent='¥'+hqShare.toLocaleString();
    document.getElementById('t-bkg').textContent=todayCount+'件';
    document.getElementById('t-cch').textContent=activeCoach+'名';
    document.getElementById('t-mbr').textContent=(memberCount||0)+'名';
    document.getElementById('t-occ').textContent=occRate+'%';

    /* アプリアイコン サブ情報 */
    document.getElementById('a-month').textContent='¥'+(monthSales>=10000?Math.round(monthSales/1000)+'k':monthSales.toLocaleString());
    document.getElementById('a-bkg').textContent=todayCount;
    document.getElementById('a-cch').textContent=activeCoach;
    document.getElementById('a-mbr').textContent=(memberCount||0);
    document.getElementById('a-occ').textContent=busy+'/'+totalSeats;

    /* バッジ */
    if(pendingCount>0){
      const b=document.getElementById('a-bkg-badge');
      b.textContent=pendingCount;b.style.display='flex';
    }
    if(pendingCoach>0){
      const b=document.getElementById('a-cch-badge');
      b.textContent=pendingCoach;b.style.display='flex';
    }

  }catch(e){
    console.error('dashboard load error',e);
  }
}

/* ============================
   日付ユーティリティ(JST)
============================ */
function getJSTDateString(offsetDays=0){
  const d=new Date();
  d.setHours(d.getHours()+9-d.getTimezoneOffset()/-60);
  d.setDate(d.getDate()+offsetDays);
  return d.toISOString().slice(0,10);
}
function getMonthStartString(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
</script>

</body>
