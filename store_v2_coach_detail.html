<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MyCoach 本部 - コーチ詳細</title>
<meta name="theme-color" content="#000000">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --main:#65CEA5;
  --main-dark:#3aa57c;
  --main-light:#A8F0D0;
  --bg:#000;
  --line:rgba(101,206,165,0.15);
  --line-strong:rgba(101,206,165,0.3);
  --muted:#7a9a8a;
  --red:#ff8a8a;
  --yellow:#FFD27A;
}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:#000;color:#fff;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 600px 400px at 20% 0%,rgba(101,206,165,0.15) 0%,transparent 60%),radial-gradient(ellipse 400px 300px at 80% 100%,rgba(101,206,165,0.08) 0%,transparent 60%);}

.wrap{position:relative;z-index:1;padding:18px 18px 40px;max-width:480px;margin:0 auto;}

/* ヘッダー */
.head{display:flex;align-items:center;gap:12px;padding:8px 4px 18px;}
.back-btn{width:38px;height:38px;background:rgba(101,206,165,0.06);border:1px solid var(--line-strong);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--main);text-decoration:none;font-size:18px;font-weight:600;}
.page-title{flex:1;}
.page-title h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.02em;}
.page-title .sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* コーチプロフィール */
.profile{background:linear-gradient(135deg,#064D3B,#0a3a2a);border:1px solid var(--line-strong);border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.profile::after{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(101,206,165,0.2),transparent 70%);}
.profile-top{display:flex;align-items:center;gap:14px;position:relative;}
.profile-photo{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#0a6c52,#1a8868);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;flex-shrink:0;border:2px solid var(--main);overflow:hidden;box-shadow:0 0 24px rgba(101,206,165,0.3);}
.profile-photo img{width:100%;height:100%;object-fit:cover;}
.profile-info{flex:1;min-width:0;}
.profile-name{font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.02em;}
.profile-meta{font-size:11px;color:var(--main-light);margin-top:4px;}
.profile-pills{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.pill{font-size:10px;padding:3px 8px;border-radius:100px;font-weight:700;}
.pill-active{background:rgba(101,206,165,0.2);color:var(--main-light);border:1px solid var(--main);}
.pill-pending{background:rgba(255,210,122,0.15);color:var(--yellow);border:1px solid rgba(255,210,122,0.3);}
.pill-warn{background:rgba(255,138,138,0.15);color:var(--red);border:1px solid rgba(255,138,138,0.3);}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;}
.kpi{background:rgba(255,255,255,0.03);border:1px solid var(--line);border-radius:14px;padding:14px;}
.kpi .lab{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:6px;}
.kpi .num{font-size:22px;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-0.02em;}
.kpi .num .u{font-size:12px;color:var(--muted);margin-left:2px;}
.kpi .num .y{color:var(--main);font-weight:400;font-size:14px;}
.kpi .d{font-size:10px;color:var(--main);margin-top:6px;font-weight:600;}
.kpi .d.warn{color:var(--yellow);}
.kpi .d.dn{color:var(--red);}

/* パネル */
.panel{background:rgba(255,255,255,0.025);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;}
.panel-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:14px;display:flex;justify-content:space-between;align-items:baseline;}
.panel-title .meta{font-size:11px;color:var(--main);font-weight:600;}

/* グラフ */
.chart{height:140px;display:flex;align-items:flex-end;gap:5px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.bar{flex:1;background:linear-gradient(180deg,var(--main),rgba(101,206,165,0.1));border-radius:4px 4px 0 0;opacity:0.5;}
.bar.peak{opacity:1;background:linear-gradient(180deg,var(--main-light),var(--main));box-shadow:0 0 16px rgba(101,206,165,0.4);}
.chart-labels{display:flex;gap:5px;margin-top:8px;font-size:9px;color:var(--muted);}
.chart-labels span{flex:1;text-align:center;}
.chart-labels .now{color:var(--main);font-weight:700;}

/* 予約行 */
.row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.row .l-date{font-size:12px;font-weight:700;color:var(--main);width:60px;}
.row .l-info{flex:1;margin-left:6px;min-width:0;}
.row .l-name{font-size:13px;font-weight:600;color:#fff;}
.row .l-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.row .l-amt{font-size:13px;font-weight:800;color:#fff;}

.bk-pill{font-size:9px;padding:3px 7px;border-radius:100px;font-weight:700;}
.bk-cfm{background:rgba(101,206,165,0.15);color:var(--main);border:1px solid var(--line-strong);}
.bk-pnd{background:rgba(255,210,122,0.15);color:var(--yellow);border:1px solid rgba(255,210,122,0.3);}
.bk-pay{background:rgba(93,212,255,0.15);color:#5dd4ff;border:1px solid rgba(93,212,255,0.3);}
.bk-cxl{background:rgba(255,138,138,0.15);color:var(--red);border:1px solid rgba(255,138,138,0.3);}

.empty{text-align:center;padding:24px 14px;color:var(--muted);font-size:12px;}
.skeleton{background:linear-gradient(90deg,rgba(101,206,165,0.05),rgba(101,206,165,0.15),rgba(101,206,165,0.05));background-size:200% 100%;animation:sk 1.5s infinite;border-radius:6px;color:transparent;display:inline-block;min-width:60px;}
@keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* タブ */
.tabs{display:flex;gap:6px;margin-bottom:14px;background:rgba(255,255,255,0.025);border:1px solid var(--line);border-radius:12px;padding:4px;}
.tab{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;padding:9px 4px;border-radius:9px;cursor:pointer;}
.tab.on{background:linear-gradient(135deg,#064D3B,#0a6c52);color:#fff;}

/* セクションタイトル */
.section-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;padding:0 4px;letter-spacing:0.05em;}
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <a href="store_v2_coaches.html" class="back-btn">←</a>
    <div class="page-title">
      <h1>コーチ詳細</h1>
      <div class="sub" id="page-sub">読込中...</div>
    </div>
  </div>

  <!-- プロフィール -->
  <div class="profile">
    <div class="profile-top">
      <div class="profile-photo" id="p-photo">?</div>
      <div class="profile-info">
        <div class="profile-name" id="p-name"><span class="skeleton">読込中</span></div>
        <div class="profile-meta" id="p-meta">--</div>
        <div class="profile-pills" id="p-pills"></div>
      </div>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi"><div class="lab">月間予約数</div><div class="num" id="kpi-bkg"><span class="skeleton">0</span><span class="u">件</span></div><div class="d" id="kpi-bkg-d">今月</div></div>
    <div class="kpi"><div class="lab">月間売上</div><div class="num"><span class="y">¥</span><span id="kpi-sales"><span class="skeleton">0</span></span></div><div class="d" id="kpi-sales-d">今月</div></div>
    <div class="kpi"><div class="lab">キャンセル率</div><div class="num" id="kpi-cxl"><span class="skeleton">0</span><span class="u">%</span></div><div class="d" id="kpi-cxl-d">今月</div></div>
    <div class="kpi"><div class="lab">空き枠登録</div><div class="num" id="kpi-slot"><span class="skeleton">0</span><span class="u">枠</span></div><div class="d" id="kpi-slot-d">直近30日</div></div>
  </div>

  <!-- 月別予約数推移 -->
  <div class="panel">
    <div class="panel-title"><span>月別予約数推移</span><span class="meta">直近6ヶ月</span></div>
    <div class="chart" id="chart-bkg"></div>
    <div class="chart-labels" id="chart-bkg-labels"></div>
  </div>

  <!-- 月別売上推移 -->
  <div class="panel">
    <div class="panel-title"><span>月別売上推移</span><span class="meta">直近6ヶ月</span></div>
    <div class="chart" id="chart-sales"></div>
    <div class="chart-labels" id="chart-sales-labels"></div>
  </div>

  <!-- 予約一覧タブ -->
  <div class="tabs">
    <button class="tab on" onclick="setBkgTab('recent',this)">直近予約</button>
    <button class="tab" onclick="setBkgTab('all',this)">全予約</button>
    <button class="tab" onclick="setBkgTab('cxl',this)">キャンセル</button>
  </div>

  <div class="panel">
    <div class="panel-title"><span id="bkg-list-title">直近の予約</span><span class="meta" id="bkg-list-count">--</span></div>
    <div id="bkg-list">
      <div class="empty">予約データを読み込み中...</div>
    </div>
  </div>

  <!-- 空き枠カレンダー -->
  <div class="panel">
    <div class="panel-title"><span>空き枠登録履歴</span><span class="meta">直近30日</span></div>
    <div id="slot-list">
      <div class="empty">空き枠データを読み込み中...</div>
    </div>
  </div>

</div>

<script>
const SB_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}});

const STORE_KEY='tozuike';
const coachId=new URLSearchParams(location.search).get('id');
let coachData=null;
let allBookings=[];
let bkgTab='recent';

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.replace('store_login.html');return;}
  if(!coachId){alert('コーチIDが指定されていません');location.replace('store_v2_coaches.html');return;}
  await loadAll();
})();

async function loadAll(){
  /* コーチ情報 */
  const{data:coach,error}=await sb.from('coaches')
    .select('id,name,photo_url,is_approved,stripe_account_id,stripe_charges_enabled,stripe_payouts_enabled,license,tags,bio,min_lesson,created_at,store_key')
    .eq('id',coachId)
    .maybeSingle();
  if(error||!coach){
    alert('コーチ情報が取得できません');
    location.replace('store_v2_coaches.html');return;
  }
  coachData=coach;
  renderProfile();

  /* 全予約取得(過去6ヶ月分)*/
  const sixMonthAgo=new Date();sixMonthAgo.setMonth(sixMonthAgo.getMonth()-6);
  const{data:bkgs}=await sb.from('bookings')
    .select('id,total_price,status,booking_date,booking_time,lesson_type,customer_name,minutes')
    .eq('coach_id',coachId)
    .gte('booking_date',getDateStr(sixMonthAgo))
    .order('booking_date',{ascending:false})
    .order('booking_time',{ascending:false});
  allBookings=bkgs||[];

  /* KPI計算 */
  renderKPI();

  /* グラフ */
  renderCharts();

  /* 予約一覧 */
  renderBookings();

  /* 空き枠 */
  await loadSlots();
}

function renderProfile(){
  document.getElementById('page-sub').textContent='Golf Create 戸津池店';
  document.getElementById('p-name').textContent=coachData.name||'(名前未設定)';
  document.getElementById('p-meta').textContent=(coachData.license||'')+(coachData.bio?' · '+coachData.bio.slice(0,30):'');
  if(coachData.photo_url){
    document.getElementById('p-photo').innerHTML=`<img src="${coachData.photo_url}" alt="">`;
  }else{
    document.getElementById('p-photo').textContent=(coachData.name||'?').charAt(0);
  }

  /* ステータスピル */
  const pills=[];
  if(!coachData.is_approved){
    pills.push('<span class="pill pill-pending">未承認</span>');
  }else{
    pills.push('<span class="pill pill-active">稼働中</span>');
  }
  if(!coachData.stripe_charges_enabled||!coachData.stripe_payouts_enabled){
    pills.push('<span class="pill pill-warn">Stripe未完了</span>');
  }else{
    pills.push('<span class="pill pill-active">Stripe完了</span>');
  }
  document.getElementById('p-pills').innerHTML=pills.join('');
}

function renderKPI(){
  const monthStart=getMonthStartString();
  const today=getDateStr(new Date());
  const monthBkgs=allBookings.filter(b=>b.booking_date>=monthStart&&b.booking_date<=today&&['confirmed','approved'].includes(b.status));
  const monthCxl=allBookings.filter(b=>b.booking_date>=monthStart&&b.booking_date<=today&&['cancelled','refunded'].includes(b.status));
  const monthAll=allBookings.filter(b=>b.booking_date>=monthStart&&b.booking_date<=today);

  const sales=monthBkgs.reduce((s,b)=>s+(parseInt(b.total_price)||0),0);
  const cxlRate=monthAll.length>0?Math.round(monthCxl.length/monthAll.length*1000)/10:0;

  document.getElementById('kpi-bkg').innerHTML=monthBkgs.length+'<span class="u">件</span>';
  document.getElementById('kpi-sales').textContent=sales.toLocaleString();
  document.getElementById('kpi-cxl').innerHTML=cxlRate+'<span class="u">%</span>';
  document.getElementById('kpi-bkg-d').textContent='今月 '+monthAll.length+'件中';

  if(cxlRate>=10){
    document.getElementById('kpi-cxl-d').textContent='注意レベル';
    document.getElementById('kpi-cxl-d').classList.add('warn');
  }else if(cxlRate>=20){
    document.getElementById('kpi-cxl-d').textContent='要対策';
    document.getElementById('kpi-cxl-d').classList.add('dn');
  }
}

async function renderCharts(){
  /* 月別6ヶ月の予約数・売上を集計 */
  const months=[];
  const now=new Date();
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({y:d.getFullYear(),m:d.getMonth()+1});
  }

  const data=months.map(mo=>{
    const start=`${mo.y}-${String(mo.m).padStart(2,'0')}-01`;
    const lastDay=new Date(mo.y,mo.m,0).getDate();
    const end=`${mo.y}-${String(mo.m).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    const monthBkgs=allBookings.filter(b=>b.booking_date>=start&&b.booking_date<=end&&['confirmed','approved'].includes(b.status));
    return{
      label:mo.m+'月',
      count:monthBkgs.length,
      sales:monthBkgs.reduce((s,b)=>s+(parseInt(b.total_price)||0),0)
    };
  });

  /* 予約数グラフ */
  const maxC=Math.max(...data.map(d=>d.count),1);
  document.getElementById('chart-bkg').innerHTML=data.map((d,i)=>{
    const h=d.count>0?Math.max(d.count/maxC*100,3):2;
    const peak=i===data.length-1?' peak':'';
    return`<div class="bar${peak}" style="height:${h}%"></div>`;
  }).join('');
  document.getElementById('chart-bkg-labels').innerHTML=data.map((d,i)=>{
    const cls=i===data.length-1?'now':'';
    return`<span class="${cls}">${d.label}<br>${d.count}件</span>`;
  }).join('');

  /* 売上グラフ */
  const maxS=Math.max(...data.map(d=>d.sales),1);
  document.getElementById('chart-sales').innerHTML=data.map((d,i)=>{
    const h=d.sales>0?Math.max(d.sales/maxS*100,3):2;
    const peak=i===data.length-1?' peak':'';
    return`<div class="bar${peak}" style="height:${h}%"></div>`;
  }).join('');
  document.getElementById('chart-sales-labels').innerHTML=data.map((d,i)=>{
    const cls=i===data.length-1?'now':'';
    return`<span class="${cls}">${d.label}<br>¥${formatK(d.sales)}</span>`;
  }).join('');
}

function renderBookings(){
  let filtered=allBookings;
  let title='直近の予約';
  if(bkgTab==='recent'){
    filtered=allBookings.slice(0,10);
    title='直近10件';
  }else if(bkgTab==='all'){
    filtered=allBookings.slice(0,30);
    title='直近30件';
  }else if(bkgTab==='cxl'){
    filtered=allBookings.filter(b=>['cancelled','refunded'].includes(b.status));
    title='キャンセル一覧';
  }

  document.getElementById('bkg-list-title').textContent=title;
  document.getElementById('bkg-list-count').textContent=filtered.length+'件';

  if(filtered.length===0){
    document.getElementById('bkg-list').innerHTML='<div class="empty">該当する予約がありません</div>';
    return;
  }

  const html=filtered.map(b=>{
    const dStr=formatDateShort(b.booking_date);
    const tStr=b.booking_time?b.booking_time.slice(0,5):'';
    const lessonMap={indoor:'インドア',round:'ラウンド',accompany:'同伴',comp:'コンペ',custom:'独自'};
    const lesson=lessonMap[b.lesson_type]||b.lesson_type;
    const minutes=b.minutes?b.minutes+'分':'';
    let pill='';
    if(b.status==='confirmed') pill='<span class="bk-pill bk-cfm">確定</span>';
    else if(b.status==='approved') pill='<span class="bk-pill bk-cfm">承認済</span>';
    else if(b.status==='pending_approval'||b.status==='pending') pill='<span class="bk-pill bk-pnd">承認待</span>';
    else if(b.status==='approved_pending_payment') pill='<span class="bk-pill bk-pay">決済待</span>';
    else if(b.status==='cancelled'||b.status==='refunded') pill='<span class="bk-pill bk-cxl">キャンセル</span>';
    else pill='<span class="bk-pill bk-pnd">'+b.status+'</span>';
    return`
      <div class="row">
        <div class="l-date">${dStr}<br><span style="color:var(--muted);font-size:10px;">${tStr}</span></div>
        <div class="l-info">
          <div class="l-name">${escapeHtml(b.customer_name||'(お客様名なし)')}</div>
          <div class="l-meta">${lesson} ${minutes} · ¥${(b.total_price||0).toLocaleString()}</div>
        </div>
        ${pill}
      </div>
    `;
  }).join('');
  document.getElementById('bkg-list').innerHTML=html;
}

function setBkgTab(t,btn){
  bkgTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderBookings();
}

async function loadSlots(){
  /* schedules テーブルから空き枠数取得 */
  const today=getDateStr(new Date());
  const future=new Date();future.setDate(future.getDate()+30);
  const{data,error}=await sb.from('schedules')
    .select('id,slot_date,slot_hour,lesson_type,status')
    .eq('coach_id',coachId)
    .gte('slot_date',today)
    .lte('slot_date',getDateStr(future))
    .order('slot_date',{ascending:true})
    .order('slot_hour',{ascending:true});
  
  const slots=data||[];
  const available=slots.filter(s=>s.status==='available');
  document.getElementById('kpi-slot').innerHTML=available.length+'<span class="u">枠</span>';
  document.getElementById('kpi-slot-d').textContent='30日先まで';

  if(slots.length===0){
    document.getElementById('slot-list').innerHTML='<div class="empty">空き枠が登録されていません</div>';
    return;
  }

  /* 日付ごとにグループ化 */
  const byDate={};
  slots.forEach(s=>{
    if(!byDate[s.slot_date])byDate[s.slot_date]=[];
    byDate[s.slot_date].push(s);
  });

  const html=Object.entries(byDate).slice(0,7).map(([date,slotArr])=>{
    const dStr=formatDateShort(date);
    const hours=slotArr.map(s=>s.slot_hour+':00').join(' / ');
    return`
      <div class="row">
        <div class="l-date">${dStr}</div>
        <div class="l-info">
          <div class="l-name" style="font-size:11px;">${hours}</div>
          <div class="l-meta">${slotArr.length}枠</div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('slot-list').innerHTML=html;
}

function getMonthStartString(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function getDateStr(d){
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateShort(ds){
  if(!ds)return'';
  const p=String(ds).split('-');
  if(p.length<3)return ds;
  const wd=['日','月','火','水','木','金','土'][new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])).getDay()];
  return`${parseInt(p[1])}/${parseInt(p[2])}(${wd})`;
}
function formatK(n){return n>=10000?Math.round(n/1000)+'k':n.toLocaleString();}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
