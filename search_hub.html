<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach — コーチを探す</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --green-deep:#051E18;
  --green-base:#064D3B;
  --green-mid:#0A6B52;
  --green-bright:#65CEA5;
  --green-glow:rgba(101,206,165,0.35);
  --gold:#C9A961;
  --gold-light:#E8D9A8;
  --gold-glow:rgba(201,169,97,0.35);
  --white:#FFFFFF;
  --text-sub:rgba(255,255,255,0.78);
  --text-faint:rgba(255,255,255,0.5);
}
html,body{
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;
  color:var(--white);
  background:var(--green-deep);
}
body{
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:24px 20px;
  position:relative;
  overflow-x:hidden;
}

/* ========== 背景レイヤー ========== */
.bg-layer{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%,rgba(101,206,165,0.18),transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%,rgba(201,169,97,0.1),transparent 60%),
    linear-gradient(180deg,#051E18 0%,#064D3B 50%,#03130E 100%);
}
.bg-noise{
  position:fixed;
  inset:0;
  z-index:1;
  opacity:0.05;
  pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.glow-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(60px);
  pointer-events:none;
  z-index:1;
}
.orb-1{
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(101,206,165,0.4),transparent 70%);
  top:-80px;right:-80px;
}
.orb-2{
  width:240px;height:240px;
  background:radial-gradient(circle,rgba(201,169,97,0.25),transparent 70%);
  bottom:-60px;left:-60px;
}

/* ========== コンテンツラッパー ========== */
.wrap{
  position:relative;
  z-index:2;
  width:100%;
  max-width:380px;
  display:flex;
  flex-direction:column;
}

/* ========== ヘッダー(ユーザー + ログアウト) ========== */
.hub-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}
.hub-user{
  display:flex;
  align-items:center;
  gap:10px;
}
.hub-avatar{
  width:40px;height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:700;
  color:var(--green-deep);
  box-shadow:0 4px 12px rgba(201,169,97,0.3);
}
.hub-user-text{font-size:11px;}
.hub-user-greet{
  color:var(--text-faint);
  font-size:9px;
  letter-spacing:2px;
  font-family:'Cormorant Garamond',serif;
  text-transform:uppercase;
}
.hub-user-name{
  color:var(--white);
  font-weight:600;
  font-size:12px;
}
.hub-logout{
  font-size:10px;
  color:var(--gold);
  background:rgba(201,169,97,0.1);
  border:1px solid rgba(201,169,97,0.3);
  padding:7px 14px;
  border-radius:8px;
  letter-spacing:1px;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.3s;
}
.hub-logout:hover{
  background:rgba(201,169,97,0.2);
  border-color:var(--gold);
}

/* ========== ブランド ========== */
.brand{
  text-align:center;
  margin-bottom:22px;
}
.brand-mark{
  display:inline-flex;
  align-items:center;
  gap:10px;
}
.brand-line{
  width:2px;height:22px;
  background:linear-gradient(180deg,var(--gold),var(--green-bright));
  border-radius:1px;
}
.brand-text{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  font-weight:600;
  letter-spacing:1px;
  background:linear-gradient(135deg,var(--white) 30%,var(--green-bright) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ========== タイトルエリア ========== */
.hub-title-area{
  text-align:center;
  margin-bottom:24px;
}
.hub-mini-label{
  font-size:10px;
  letter-spacing:4px;
  color:var(--gold);
  margin-bottom:8px;
  font-family:'Cormorant Garamond',serif;
  font-weight:600;
}
.hub-main-title{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;
  font-weight:600;
  background:linear-gradient(135deg,var(--white),var(--green-bright));
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:1px;
  margin-bottom:6px;
  line-height:1.3;
}
.hub-sub{
  font-size:11px;
  color:var(--text-sub);
  letter-spacing:0.5px;
}

/* ========== カード ========== */
.hub-cards{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin-top:4px;
}
.hub-card{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px) saturate(1.5);
  -webkit-backdrop-filter:blur(20px) saturate(1.5);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;
  position:relative;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  transition:all 0.3s;
}
.hub-card:hover,.hub-card:active{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.06);
}
.hub-card.featured{
  border-color:rgba(101,206,165,0.4);
  background:linear-gradient(135deg,rgba(101,206,165,0.1),rgba(101,206,165,0.02));
  box-shadow:0 4px 20px rgba(101,206,165,0.15);
}
.hub-card.featured:hover,.hub-card.featured:active{
  box-shadow:0 6px 28px rgba(101,206,165,0.25);
}
.hub-card-badge{
  position:absolute;
  top:-8px;right:18px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:var(--green-deep);
  font-size:8px;
  font-weight:700;
  letter-spacing:2px;
  padding:3px 10px;
  border-radius:10px;
}
.hub-card-badge.new{
  background:linear-gradient(135deg,#FF6B6B,#FF8E53);
  color:#fff;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}
.hub-card-icon{
  width:56px;height:56px;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(101,206,165,0.25),rgba(101,206,165,0.05));
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.hub-card-icon svg{
  width:28px;height:28px;
  fill:none;
  stroke:var(--green-bright);
  stroke-width:2;
}
.hub-card-text{flex:1;min-width:0;}
.hub-card-title{
  font-size:15px;
  font-weight:600;
  color:var(--white);
  margin-bottom:4px;
}
.hub-card-desc{
  font-size:10px;
  color:var(--text-faint);
  letter-spacing:0.3px;
  line-height:1.6;
}
.hub-card-arrow{
  width:24px;height:24px;
  fill:none;
  stroke:var(--gold);
  stroke-width:2;
  flex-shrink:0;
}

/* ========== ヒントカード ========== */
.hint-card{
  background:rgba(201,169,97,0.08);
  border:1px solid rgba(201,169,97,0.2);
  border-radius:14px;
  padding:14px 16px;
  margin-top:20px;
  font-size:10px;
  color:var(--text-sub);
  line-height:1.8;
}
.hint-card strong{color:var(--gold);font-weight:600;}
.hint-title{
  font-size:11px;
  font-weight:600;
  color:var(--gold);
  margin-bottom:4px;
}

/* ========== フッター ========== */
.footer{
  text-align:center;
  font-size:9px;
  color:rgba(255,255,255,0.3);
  letter-spacing:2px;
  margin-top:24px;
  text-transform:uppercase;
}
.footer-dot{
  display:inline-block;
  width:3px;height:3px;
  border-radius:50%;
  background:var(--gold);
  margin:0 6px;
  vertical-align:middle;
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-noise"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>

<div class="wrap">

  <div class="hub-header">
    <div class="hub-user">
      <div class="hub-avatar" id="user-avatar">M</div>
      <div class="hub-user-text">
        <div class="hub-user-greet">WELCOME</div>
        <div class="hub-user-name" id="user-name">読み込み中...</div>
      </div>
    </div>
    <button class="hub-logout" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="brand">
    <div class="brand-mark">
      <div class="brand-line"></div>
      <div class="brand-text">MyCoach</div>
      <div class="brand-line"></div>
    </div>
  </div>

  <div class="hub-title-area">
    <div class="hub-mini-label">FIND YOUR COACH</div>
    <div class="hub-main-title">最適なコーチを<br>見つけましょう</div>
    <div class="hub-sub">あなたのスタイルに合った検索方法をお選びください</div>
  </div>

  <div class="hub-cards">

    <div class="hub-card featured" onclick="goToLesson()">
      <div class="hub-card-badge">RECOMMENDED</div>
      <div class="hub-card-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2l2.39 7.36H22l-6.18 4.5 2.36 7.36L12 16.7l-6.18 4.5 2.36-7.36L2 9.36h7.61L12 2z"/></svg>
      </div>
      <div class="hub-card-text">
        <div class="hub-card-title">レッスン内容から探す</div>
        <div class="hub-card-desc">インドア・ラウンド・同伴<br>受けたいレッスンから</div>
      </div>
      <svg class="hub-card-arrow" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </div>

    <div class="hub-card" onclick="goToCoach()">
      <div class="hub-card-badge new">NEW</div>
      <div class="hub-card-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="hub-card-text">
        <div class="hub-card-title">コーチから探す</div>
        <div class="hub-card-desc">プロフィール・実績<br>気になるコーチから</div>
      </div>
      <svg class="hub-card-arrow" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </div>

  </div>

  <div class="hint-card">
    <div class="hint-title">💡 どちらを選べばいい?</div>
    目的が決まっているなら「<strong>レッスン内容から</strong>」、人柄や実績で選びたいなら「<strong>コーチから</strong>」がおすすめです。
  </div>

  <div class="footer">Golf Create 戸津池<span class="footer-dot"></span>Premium Membership</div>

</div>

<script>
const SUPABASE_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{
  auth:{persistSession:true,storageKey:'gc',storage:window.localStorage,autoRefreshToken:true,detectSessionInUrl:false}
});

sb.auth.getSession().then(function(res){
  var session=res.data.session;
  if(!session){
    window.location.href='customer_login.html?from=top';
    return;
  }
  var name=session.user.user_metadata&&session.user.user_metadata.name?session.user.user_metadata.name:session.user.email;
  document.getElementById('user-name').textContent=name+'さん';
  // アバター頭文字
  var firstChar=name.charAt(0).toUpperCase();
  document.getElementById('user-avatar').textContent=firstChar;
});

function goToLesson(){
  window.location.href='customer.html';
}

function goToCoach(){
  window.location.href='customer.html?entry=coach';
}

async function doLogout(){
  await sb.auth.signOut();
  window.location.href='customer_login.html?from=top';
}
</script>
</body>
</html>
