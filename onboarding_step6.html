<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCoach — ようこそ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#051E18;
  color:#fff;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(101,206,165,0.22) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 85%, rgba(201,169,97,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(6,77,59,0.6) 0%, transparent 70%);
  z-index:0;
  pointer-events:none;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
  opacity:0.06;
  z-index:0;
  pointer-events:none;
  mix-blend-mode:overlay;
}

.glow-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(60px);
  z-index:1;
  pointer-events:none;
  animation:float 8s ease-in-out infinite;
}
.glow-orb-1{
  width:320px;height:320px;
  background:radial-gradient(circle,rgba(101,206,165,0.5),transparent 70%);
  top:-100px;right:-100px;
}
.glow-orb-2{
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(201,169,97,0.4),transparent 70%);
  bottom:-80px;left:-80px;
  animation-delay:2s;
}
.glow-orb-3{
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(101,206,165,0.3),transparent 70%);
  top:40%;left:50%;
  transform:translate(-50%,-50%);
  animation-delay:1s;
}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1);}
  50%{transform:translate(15px,-20px) scale(1.05);}
}

/* 紙吹雪アニメーション */
.confetti{
  position:fixed;
  top:-20px;
  width:10px;
  height:10px;
  z-index:5;
  pointer-events:none;
  opacity:0;
  animation:confettiFall 4s ease-in forwards;
}
@keyframes confettiFall{
  0%{
    opacity:0;
    transform:translateY(0) rotate(0deg);
  }
  10%{opacity:1;}
  100%{
    opacity:0;
    transform:translateY(100vh) rotate(720deg);
  }
}

.container{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 24px;
  max-width:480px;
  margin:0 auto;
}

.step-indicator{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:32px;
  opacity:0;
  animation:fadeIn 0.6s ease 0.1s forwards;
}
.step-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:all 0.3s;
}
.step-dot.done{background:#65CEA5;box-shadow:0 0 8px rgba(101,206,165,0.6);}
.step-dot.current{
  background:#C9A961;
  width:24px;
  border-radius:6px;
  box-shadow:0 0 12px rgba(201,169,97,0.7);
}
.step-text{
  font-size:11px;
  color:rgba(255,255,255,0.55);
  margin-left:8px;
  letter-spacing:0.05em;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* セレブレーションエフェクト */
.celebration-area{
  text-align:center;
  margin-bottom:24px;
  opacity:0;
  animation:fadeIn 0.6s ease 0.3s forwards;
}

.celebration-icon{
  width:100px;
  height:100px;
  margin:0 auto 18px;
  border-radius:50%;
  background:linear-gradient(135deg,#65CEA5,#C9A961);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  box-shadow:
    0 20px 60px rgba(101,206,165,0.5),
    0 0 0 8px rgba(101,206,165,0.1),
    0 0 0 16px rgba(101,206,165,0.05);
  animation:pulseGlow 2s ease-in-out infinite, scaleIn 0.6s ease 0.3s backwards;
  position:relative;
}
.celebration-icon::after{
  content:'';
  position:absolute;
  inset:-4px;
  border-radius:50%;
  border:2px dashed rgba(201,169,97,0.4);
  animation:rotate 8s linear infinite;
}
@keyframes pulseGlow{
  0%,100%{
    box-shadow:
      0 20px 60px rgba(101,206,165,0.5),
      0 0 0 8px rgba(101,206,165,0.1),
      0 0 0 16px rgba(101,206,165,0.05);
  }
  50%{
    box-shadow:
      0 20px 80px rgba(101,206,165,0.7),
      0 0 0 12px rgba(101,206,165,0.15),
      0 0 0 24px rgba(101,206,165,0.08);
  }
}
@keyframes scaleIn{
  from{transform:scale(0);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
@keyframes rotate{
  to{transform:rotate(360deg);}
}

.welcome-title{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;
  font-weight:600;
  letter-spacing:0.02em;
  background:linear-gradient(135deg,#fff 0%,#C9A961 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1;
  margin-bottom:6px;
}
.welcome-subtitle{
  font-size:14px;
  color:rgba(255,255,255,0.8);
  font-weight:500;
  letter-spacing:0.05em;
  margin-bottom:10px;
}
.user-greeting{
  font-size:18px;
  color:#65CEA5;
  font-weight:700;
  letter-spacing:0.02em;
  margin-bottom:12px;
}
.user-greeting .user-name{
  background:linear-gradient(135deg,#fff,#65CEA5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* メインカード */
.card{
  width:100%;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;
  padding:24px 22px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  opacity:0;
  animation:fadeIn 0.7s ease 0.5s forwards;
  margin-bottom:18px;
}

.message-text{
  font-size:13px;
  color:rgba(255,255,255,0.85);
  line-height:1.8;
  text-align:center;
  margin-bottom:22px;
}
.message-text strong{color:#65CEA5;font-weight:700;}

.features-grid{
  display:grid;
  gap:12px;
  margin-bottom:20px;
}

.feature-item{
  display:flex;
  gap:12px;
  align-items:flex-start;
  padding:12px 14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  transition:all 0.2s;
}
.feature-item:hover{
  background:rgba(255,255,255,0.07);
  border-color:rgba(101,206,165,0.3);
}

.feature-icon{
  width:40px;
  height:40px;
  border-radius:10px;
  background:linear-gradient(135deg,rgba(101,206,165,0.2),rgba(6,77,59,0.4));
  border:1px solid rgba(101,206,165,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  flex-shrink:0;
}

.feature-body{flex:1;min-width:0;}
.feature-title{
  font-size:13px;
  font-weight:700;
  color:#fff;
  margin-bottom:2px;
  letter-spacing:0.02em;
}
.feature-desc{
  font-size:11px;
  color:rgba(255,255,255,0.65);
  line-height:1.6;
}

/* メインCTAボタン */
.btn-primary{
  width:100%;
  padding:18px;
  background:linear-gradient(135deg,#65CEA5,#3da37c);
  color:#fff;
  border:none;
  border-radius:14px;
  font-family:inherit;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:0.04em;
  box-shadow:0 10px 30px rgba(101,206,165,0.4);
  transition:all 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.btn-primary:active{transform:scale(0.98);}
.btn-primary:hover{
  box-shadow:0 14px 40px rgba(101,206,165,0.55);
  transform:translateY(-2px);
}

.btn-arrow{
  font-size:18px;
  transition:transform 0.2s;
}
.btn-primary:hover .btn-arrow{
  transform:translateX(4px);
}

.footer-text{
  margin-top:24px;
  text-align:center;
  font-size:10px;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.05em;
  opacity:0;
  animation:fadeIn 0.6s ease 0.7s forwards;
}

.spinner{
  display:inline-block;
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-right:6px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>

<div class="container">

  <div class="step-indicator">
    <div class="step-dot done"></div>
    <div class="step-dot done"></div>
    <div class="step-dot done"></div>
    <div class="step-dot done"></div>
    <div class="step-dot done"></div>
    <div class="step-dot current"></div>
    <span class="step-text">完了!</span>
  </div>

  <!-- セレブレーション -->
  <div class="celebration-area">
    <div class="celebration-icon">🎉</div>
    <div class="welcome-title">Welcome</div>
    <div class="welcome-subtitle">to MyCoach</div>
    <div class="user-greeting">
      <span class="user-name" id="user-name">お客様</span> 様、<br>
      ご登録ありがとうございます!
    </div>
  </div>

  <!-- 機能紹介カード -->
  <div class="card">
    <div class="message-text">
      <strong>MyCoach</strong> は<br>
      Golf Create 戸津池店の会員様向け<br>
      コーチマッチングサービスです
    </div>

    <div class="features-grid">
      <div class="feature-item">
        <div class="feature-icon">🔍</div>
        <div class="feature-body">
          <div class="feature-title">コーチを探す</div>
          <div class="feature-desc">ご希望のレッスン内容や日時から、ぴったりのコーチを見つけられます</div>
        </div>
      </div>

      <div class="feature-item">
        <div class="feature-icon">📅</div>
        <div class="feature-body">
          <div class="feature-title">かんたん予約</div>
          <div class="feature-desc">空き時間を確認して、すぐに予約申込ができます</div>
        </div>
      </div>

      <div class="feature-item">
        <div class="feature-icon">💳</div>
        <div class="feature-body">
          <div class="feature-title">安心の決済</div>
          <div class="feature-desc">コーチ承認後、LINEに届く決済リンクから簡単お支払い</div>
        </div>
      </div>

      <div class="feature-item">
        <div class="feature-icon">⭐</div>
        <div class="feature-body">
          <div class="feature-title">レビュー機能</div>
          <div class="feature-desc">レッスン後の評価で、コーチを応援できます</div>
        </div>
      </div>
    </div>

    <button class="btn-primary" onclick="goToHub()">
      コーチを探す
      <span class="btn-arrow">→</span>
    </button>
  </div>

  <div class="footer-text">© KSK.KK — Powered by Golf Create</div>

</div>

<script>
const SUPABASE_URL='https://gojrdnufmueuvkroevut.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{
  auth:{persistSession:true,storageKey:'gc',storage:window.localStorage,autoRefreshToken:true,detectSessionInUrl:false}
});

/* セッション確認 + ユーザー名表示 */
window.addEventListener('DOMContentLoaded',async function(){
  var res=await sb.auth.getSession();
  if(!res.data.session){
    window.location.href='customer_login.html';
    return;
  }
  var uid=res.data.session.user.id;

  try{
    var{data}=await sb.from('customers').select('name').eq('user_id',uid).maybeSingle();
    if(data&&data.name){
      document.getElementById('user-name').textContent=data.name;
    }
  }catch(e){console.warn('ユーザー名取得失敗',e);}

  /* 紙吹雪エフェクト発火 */
  launchConfetti();
});

/* 紙吹雪を画面に降らせる */
function launchConfetti(){
  var colors=['#65CEA5','#C9A961','#FFFFFF','#3da37c','#a88742'];
  var count=40;
  for(var i=0;i<count;i++){
    setTimeout(function(){
      var c=document.createElement('div');
      c.className='confetti';
      c.style.left=Math.random()*100+'%';
      c.style.background=colors[Math.floor(Math.random()*colors.length)];
      var size=4+Math.random()*8;
      c.style.width=size+'px';
      c.style.height=size+'px';
      c.style.borderRadius=Math.random()>0.5?'50%':'2px';
      c.style.animationDuration=(3+Math.random()*2)+'s';
      c.style.animationDelay=Math.random()*0.5+'s';
      document.body.appendChild(c);
      setTimeout(function(){c.remove();},5000);
    },i*50);
  }
}

function goToHub(){
  window.location.href='search_hub.html';
}
</script>
</body>
</html>
