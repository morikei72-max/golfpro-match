<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MyCoach">
<title>MyCoach — お客様ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--green-deep:#051E18;--green-base:#064D3B;--green-mid:#0A6B52;--green-bright:#65CEA5;--gold:#C9A961;--gold-light:#E8D9A8;--white:#FFFFFF;--text-sub:rgba(255,255,255,0.78);--text-faint:rgba(255,255,255,0.5);--line:#06C755;}
html,body{font-family:'Noto Sans JP',sans-serif;min-height:100vh;color:var(--white);background:var(--green-deep);}
body{display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow-x:hidden;}
.bg-layer{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(101,206,165,0.18),transparent 60%),radial-gradient(ellipse 60% 40% at 100% 100%,rgba(201,169,97,0.1),transparent 60%),linear-gradient(180deg,#051E18 0%,#064D3B 50%,#03130E 100%);}
.bg-noise{position:fixed;inset:0;z-index:1;opacity:0.05;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
.glow-orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:1;}
.orb-1{width:280px;height:280px;background:radial-gradient(circle,rgba(101,206,165,0.4),transparent 70%);top:-80px;right:-80px;}
.orb-2{width:240px;height:240px;background:radial-gradient(circle,rgba(201,169,97,0.25),transparent 70%);bottom:-60px;left:-60px;}
.wrap{position:relative;z-index:2;width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;padding:30px 0;}
.brand{text-align:center;margin-bottom:28px;}
.brand-mark{display:inline-flex;align-items:center;gap:10px;margin-bottom:10px;}
.brand-line{width:2px;height:24px;background:linear-gradient(180deg,var(--gold),var(--green-bright));border-radius:1px;}
.brand-text{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;letter-spacing:1px;background:linear-gradient(135deg,var(--white) 30%,var(--green-bright) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.brand-tagline{display:inline-block;font-size:8px;letter-spacing:4px;color:var(--gold);background:rgba(201,169,97,0.1);border:1px solid rgba(201,169,97,0.3);padding:3px 10px;border-radius:10px;text-transform:uppercase;}
.glass-card{width:100%;background:rgba(255,255,255,0.04);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-radius:24px;padding:32px 24px;position:relative;}
.glass-card::before{content:'';position:absolute;inset:0;border-radius:24px;padding:1px;background:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0.05) 50%,rgba(201,169,97,0.2));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.section-title{font-size:22px;font-weight:600;color:var(--white);margin-bottom:8px;text-align:center;}
.section-title .accent{color:var(--green-bright);font-family:'Cormorant Garamond',serif;font-weight:600;}
.section-sub{font-size:13px;color:var(--text-sub);text-align:center;margin-bottom:28px;letter-spacing:0.5px;line-height:1.7;}
.btn-line{width:100%;background:var(--line);color:var(--white);border:none;border-radius:14px;padding:18px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 24px rgba(6,199,85,0.35),inset 0 1px 0 rgba(255,255,255,0.2);}
.btn-line svg{width:22px;height:22px;}
.line-note{font-size:12px;color:var(--text-sub);text-align:center;margin-top:16px;line-height:1.7;}
.err{color:#ff8a8a;font-size:13px;margin-bottom:16px;display:none;text-align:center;padding:12px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:10px;line-height:1.6;}
.loading{text-align:center;padding:20px 0;}
.spinner{width:48px;height:48px;border:4px solid rgba(101,206,165,0.2);border-top-color:var(--green-bright);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--text-sub);letter-spacing:1px;}
.hidden{display:none;}
.footer{text-align:center;font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-top:24px;text-transform:uppercase;}
.footer-dot{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--gold);margin:0 6px;vertical-align:middle;}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-noise"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>

<div class="wrap">

  <div class="brand">
    <div class="brand-mark">
      <div class="brand-line"></div>
      <div class="brand-text">MyCoach</div>
      <div class="brand-line"></div>
    </div>
    <div class="brand-tagline">Premium Golf Coaching</div>
  </div>

  <div class="glass-card">

    <!-- 処理中 -->
    <div id="loading-view" class="loading">
      <div class="spinner"></div>
      <div class="loading-text">準備しています...</div>
    </div>

    <!-- ログイン -->
    <div id="login-view" class="hidden">
      <div class="section-title">ようこそ <span class="accent">MyCoach</span> へ</div>
      <div class="section-sub">LINEではじめましょう<br>ボタンを押すだけで完了します</div>

      <div id="err" class="err"></div>

      <button class="btn-line" onclick="startLineLogin()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 5.69 2 10.23c0 4.07 3.56 7.48 8.37 8.12.33.07.77.22.88.5.1.26.07.66.03.92l-.14.85c-.04.26-.2.99.87.54 1.07-.45 5.77-3.4 7.87-5.82C21.41 13.74 22 12.05 22 10.23 22 5.69 17.52 2 12 2z"/></svg>
        LINEで始める
      </button>

      <div class="line-note">初めての方も登録済みの方も、このボタンだけでご利用いただけます。</div>
    </div>

  </div>

  <div class="footer">Golf Create 戸津池<span class="footer-dot"></span>会員様専用</div>

</div>

<script>
const sb=supabase.createClient('https://gojrdnufmueuvkroevut.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvanJkbnVmbXVldXZrcm9ldnV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzQwNDEsImV4cCI6MjA5MDg1MDA0MX0.NQFy92gZpymKj88C0KJk4Z6ztwMu2AwgDrLCaBrHRYw',{auth:{persistSession:true,storageKey:'gc',storage:localStorage,autoRefreshToken:true}});

const LIFF_ID='2010206965-HfioOoUZ';

/* tab パラメータを取得する。LINEからLIFF URL(?tab=bookings)で開いた場合、
   liff.init() 前は ?tab= が liff.state にエンコードされて届くため、
   直接読めない時は liff.state の中身を展開して tab を取り出す */
function getTabParam(){
  var sp=new URLSearchParams(location.search);
  var t=sp.get('tab');
  if(t) return t;
  var state=sp.get('liff.state');
  if(state){
    var dec=decodeURIComponent(state);
    var q=dec.indexOf('?')>=0 ? dec.substring(dec.indexOf('?')+1) : dec;
    return new URLSearchParams(q).get('tab');
  }
  return null;
}

/* ログイン後の遷移先を決める(従来の仕組みをそのまま流用)
   名前あり かつ 会員認証済 → コーチ探し(search_hub)
   それ以外は従来どおりの分岐。LINEログインで作られたお客様は
   name=LINE表示名・is_approved=true のため、必ず search_hub へ進む。 */
async function routeAfterAuth(session){
  if(!session) return false;
  const {data:cust}=await sb.from('customers').select('id,name,is_approved,line_user_id').eq('user_id',session.user.id).maybeSingle();
  if(cust && cust.name && cust.is_approved){
    var _tab=getTabParam();
    if(_tab==='mypage'||_tab==='bookings'){ location.replace('customer.html?tab='+_tab); }
    else { location.replace('search_hub.html'); }
  }else if(cust && cust.is_approved){
    location.replace('onboarding_step5.html');
  }else{
    location.replace('onboarding_step2.html');
  }
  return true;
}

function showLogin(){
  document.getElementById('loading-view').classList.add('hidden');
  document.getElementById('login-view').classList.remove('hidden');
}
function showLoading(text){
  document.getElementById('login-view').classList.add('hidden');
  const lv=document.getElementById('loading-view');
  lv.classList.remove('hidden');
  lv.querySelector('.loading-text').textContent=text||'準備しています...';
}
function showError(msg){
  showLogin();
  const err=document.getElementById('err');
  err.textContent=msg;
  err.style.display='block';
}

/* LINEログインから戻ってきた後・またはボタン押下後に実行する本処理 */
async function doLineLogin(){
  showLoading('ログイン中...');
  try{
    const accessToken=liff.getAccessToken();
    if(!accessToken){ showError('LINE情報を取得できませんでした。もう一度お試しください'); return; }

    const res=await fetch('/.netlify/functions/customer-line-login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ access_token: accessToken })
    });
    const result=await res.json();

    if(!res.ok || !result.success){
      showError(result.error||'ログインに失敗しました。もう一度お試しください');
      return;
    }

    /* 発行されたトークンでログイン状態を確立(メールもパスワードも不要) */
    const {error}=await sb.auth.verifyOtp({ token_hash: result.token_hash, type:'email' });
    if(error){
      console.error('[verifyOtp]',error);
      showError('ログインに失敗しました。もう一度お試しください');
      return;
    }

    const {data:{session}}=await sb.auth.getSession();
    const routed=await routeAfterAuth(session);
    if(!routed){ showError('ログインに失敗しました。もう一度お試しください'); }

  }catch(e){
    console.error('[doLineLogin]',e);
    showError('ログインに失敗しました。もう一度お試しください');
  }
}

/* 「LINEで始める」ボタン押下 */
async function startLineLogin(){
  showLoading('LINEに接続しています...');
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){
      /* LINEのログイン画面へ。完了後この画面に戻る */
      liff.login({ redirectUri: location.href });
      return;
    }
    await doLineLogin();
  }catch(e){
    console.error('[startLineLogin]',e);
    showError('LINEに接続できませんでした。もう一度お試しください');
  }
}

/* ページ読み込み時 */
(async()=>{
  try{
    /* 既にログイン済みなら自動でホームへ */
    const {data:{session}}=await sb.auth.getSession();
    if(session){ await routeAfterAuth(session); return; }

    /* LIFFを初期化。LINEログインから戻ってきた直後なら自動で続行 */
    await liff.init({ liffId: LIFF_ID });
    if(liff.isLoggedIn()){
      await doLineLogin();
      return;
    }
  }catch(e){
    console.error('[init]',e);
  }
  /* 上記いずれでもなければログインボタンを表示 */
  showLogin();
})();
</script>
</body>
</html>
